<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하준이 집 🏡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:   #FAF6F0;
      --warm:    #F5EDE0;
      --brown:   #8B6B4A;
      --dark:    #2C1A0E;
      --soft:    #C4956A;
      --green:   #7A9E7E;
      --pink:    #E8B4B8;
      --text:    #3D2B1F;
      --muted:   #9B8B7E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Gowun Dodum', serif;
      min-height: 100vh;
    }

    /* ── 커버 ── */
    .cover {
      position: relative;
      height: 100vh;
      max-height: 640px;
      overflow: hidden;
      background: linear-gradient(160deg, #E8D5C0 0%, #D4B896 50%, #C49A6C 100%);
    }

    .cover-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 60%, rgba(232,180,184,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 30%, rgba(122,158,126,0.25) 0%, transparent 50%);
    }

    /* 사진 자리 (나중에 실제 사진으로 교체) */
    .cover-photo {
      position: absolute; inset: 0;
      background: url('') center/cover no-repeat;
      opacity: 0.6;
    }

    .cover-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, rgba(44,26,14,0.6) 100%);
    }

    .cover-content {
      position: absolute;
      bottom: 40px; left: 0; right: 0;
      text-align: center;
      color: white;
      padding: 0 24px;
      animation: fadeUp 0.8s ease;
    }

    .cover-name {
      font-family: 'Noto Serif KR', serif;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
      margin-bottom: 8px;
    }

    .cover-sub {
      font-size: 13px;
      letter-spacing: 3px;
      opacity: 0.85;
      margin-bottom: 20px;
    }

    .cover-dday {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* ── 네비 ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--cream);
      border-bottom: 1px solid rgba(139,107,74,0.15);
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 0 16px;
    }

    .nav-item {
      padding: 16px 20px;
      font-size: 13px;
      letter-spacing: 1.5px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-item.active {
      color: var(--brown);
      border-bottom-color: var(--soft);
    }

    /* ── 메인 컨텐츠 ── */
    .main { max-width: 640px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── 섹션 헤더 ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 32px 0 20px;
    }

    .section-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--dark);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: rgba(139,107,74,0.2);
    }

    /* ── D-DAY 카운터 ── */
    .dday-card {
      background: linear-gradient(135deg, #FFF8F0 0%, #F5EDE0 100%);
      border: 1px solid rgba(139,107,74,0.2);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .dday-card::before {
      content: '🎂';
      position: absolute;
      top: -10px; right: 20px;
      font-size: 60px;
      opacity: 0.12;
    }

    .dday-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .dday-number {
      font-family: 'Noto Serif KR', serif;
      font-size: 52px;
      font-weight: 300;
      color: var(--brown);
      line-height: 1;
      margin-bottom: 8px;
    }

    .dday-desc {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ── 마일스톤 ── */
    .milestone-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .milestone-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: white;
      border: 1px solid rgba(139,107,74,0.12);
      border-radius: 14px;
      padding: 16px 20px;
      animation: fadeUp 0.5s ease both;
    }

    .milestone-icon {
      font-size: 24px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: var(--warm);
      border-radius: 12px;
      flex-shrink: 0;
    }

    .milestone-info { flex: 1; }

    .milestone-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 3px;
    }

    .milestone-date {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .milestone-badge {
      font-size: 11px;
      background: var(--green);
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .milestone-badge.pending {
      background: var(--warm);
      color: var(--muted);
    }

    /* ── 사진 그리드 ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-bottom: 8px;
    }

    .photo-item {
      aspect-ratio: 1;
      background: var(--warm);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
    }

    .photo-item:hover { transform: scale(0.97); }

    .photo-item img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* 첫번째 사진 크게 */
    .photo-item:first-child {
      grid-column: span 2;
      grid-row: span 2;
    }

    .photo-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      background: linear-gradient(135deg, #F5EDE0, #E8D5C0);
      color: var(--muted);
    }

    .photo-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(44,26,14,0.7), transparent);
      color: white;
      padding: 20px 10px 10px;
      font-size: 11px;
      line-height: 1.4;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .photo-item:hover .photo-content { opacity: 1; }

    /* ── 방명록 ── */
    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .comment-item {
      background: white;
      border: 1px solid rgba(139,107,74,0.1);
      border-radius: 14px;
      padding: 16px 18px;
    }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .comment-avatar {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--pink), var(--soft));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      color: white;
      font-weight: 600;
    }

    .comment-author {
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
    }

    .comment-lang {
      font-size: 10px;
      background: var(--warm);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: auto;
    }

    .comment-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
    }

    .comment-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── 댓글 입력 ── */
    .comment-form {
      background: white;
      border: 1px solid rgba(139,107,74,0.15);
      border-radius: 16px;
      padding: 16px;
    }

    .comment-form input,
    .comment-form textarea {
      width: 100%;
      background: var(--warm);
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Gowun Dodum', serif;
      font-size: 13px;
      color: var(--dark);
      outline: none;
      margin-bottom: 8px;
      resize: none;
    }

    .comment-form textarea { height: 80px; }

    .comment-submit {
      width: 100%;
      background: var(--brown);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Gowun Dodum', serif;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .comment-submit:hover { background: var(--dark); }

    /* ── 방문자 카운터 ── */
    .visit-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 16px;
      background: var(--warm);
      border-radius: 14px;
      margin-bottom: 24px;
    }

    .visit-item { text-align: center; }

    .visit-num {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      color: var(--brown);
      font-weight: 600;
    }

    .visit-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    .visit-divider {
      width: 1px; height: 32px;
      background: rgba(139,107,74,0.2);
    }

    /* ── 업로드 버튼 ── */
    .upload-btn {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 56px; height: 56px;
      background: var(--brown);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(139,107,74,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 200;
    }

    .upload-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(139,107,74,0.5);
    }

    /* ── 로딩 스켈레톤 ── */
    .skeleton {
      background: linear-gradient(90deg, var(--warm) 25%, #EDE3D5 50%, var(--warm) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    /* ── 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(44,26,14,0.7);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--cream);
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
      animation: fadeUp 0.3s ease;
    }

    .modal-photo {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 16px;
      background: var(--warm);
    }

    .modal-content-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 12px;
    }

    .modal-date {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(44,26,14,0.5);
      color: white;
      border: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
    }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── 애니메이션 ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── 탭 콘텐츠 ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeUp 0.4s ease; }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>

<!-- 커버 -->
<div class="cover">
  <div class="cover-bg"></div>
  <div class="cover-photo" id="coverPhoto"></div>
  <div class="cover-overlay"></div>
  <div class="cover-content">
    <div class="cover-name">김하준</div>
    <div class="cover-sub">KIM HA JUN · MANGO 🥭</div>
    <div class="cover-dday" id="coverDday">백일까지 D-?</div>
  </div>
</div>

<!-- 네비 -->
<nav class="nav">
  <div class="nav-item active" data-tab="home">홈</div>
  <div class="nav-item" data-tab="gallery">사진첩</div>
  <div class="nav-item" data-tab="milestone">성장</div>
  <div class="nav-item" data-tab="guestbook">방명록</div>
</nav>

<!-- 메인 -->
<div class="main">

  <!-- 홈 탭 -->
  <div class="tab-content active" id="tab-home">

    <!-- D-DAY 카운터 -->
    <div class="dday-card">
      <div class="dday-label">HUNDRED DAYS</div>
      <div class="dday-number" id="ddayNumber">—</div>
      <div class="dday-desc" id="ddayDesc">2026년 3월 31일 백일</div>
    </div>

    <!-- 방문 통계 -->
    <div class="visit-bar">
      <div class="visit-item">
        <div class="visit-num" id="visitToday">0</div>
        <div class="visit-label">오늘</div>
      </div>
      <div class="visit-divider"></div>
      <div class="visit-item">
        <div class="visit-num" id="visitTotal">0</div>
        <div class="visit-label">전체</div>
      </div>
      <div class="visit-divider"></div>
      <div class="visit-item">
        <div class="visit-num" id="mediaCount">0</div>
        <div class="visit-label">사진</div>
      </div>
    </div>

    <!-- 최근 사진 -->
    <div class="section-header">
      <div class="section-title">최근 사진</div>
      <div class="section-line"></div>
    </div>
    <div class="photo-grid" id="recentPhotos">
      <!-- JS로 렌더 -->
    </div>

    <!-- 최근 마일스톤 -->
    <div class="section-header">
      <div class="section-title">성장 기록</div>
      <div class="section-line"></div>
    </div>
    <div class="milestone-list" id="recentMilestones">
      <!-- JS로 렌더 -->
    </div>

  </div>

  <!-- 사진첩 탭 -->
  <div class="tab-content" id="tab-gallery">
    <div class="section-header">
      <div class="section-title">사진첩</div>
      <div class="section-line"></div>
    </div>
    <div class="photo-grid" id="allPhotos"></div>
  </div>

  <!-- 성장 탭 -->
  <div class="tab-content" id="tab-milestone">
    <div class="section-header">
      <div class="section-title">성장 기록</div>
      <div class="section-line"></div>
    </div>
    <div class="milestone-list" id="allMilestones"></div>
  </div>

  <!-- 방명록 탭 -->
  <div class="tab-content" id="tab-guestbook">
    <div class="section-header">
      <div class="section-title">방명록</div>
      <div class="section-line"></div>
    </div>
    <div class="comment-list" id="commentList"></div>

    <div class="comment-form">
      <input type="text" id="commentAuthor" placeholder="이름을 입력하세요 (예: 할머니, Bà ngoại)">
      <textarea id="commentText" placeholder="하준이에게 한마디 남겨주세요 💌&#10;한국어, 베트남어 모두 괜찮아요"></textarea>
      <button class="comment-submit" onclick="submitComment()">방명록 남기기</button>
    </div>
  </div>

</div>

<!-- 업로드 버튼 (집주인만 표시) -->
<button class="upload-btn" id="uploadBtn" style="display:none" onclick="showUploadModal()">+</button>

<!-- 사진 모달 -->
<div class="modal-overlay" id="photoModal" onclick="closeModal(event)">
  <div class="modal-box" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('photoModal').classList.remove('open')">✕</button>
    <img class="modal-photo" id="modalPhoto" src="" alt="">
    <div class="modal-content-text" id="modalContent"></div>
    <div class="modal-date" id="modalDate"></div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const HOUSE_SLUG = 'hajun';
const HUNDRED_DAYS = new Date('2026-03-31');
const BIRTH_DATE   = new Date('2025-12-22');

let houseData = null;

// ─── D-DAY 계산 ───────────────────────────────────────
function calcDday() {
  const now   = new Date();
  const diff  = Math.ceil((HUNDRED_DAYS - now) / (1000 * 60 * 60 * 24));
  const days  = Math.floor((now - BIRTH_DATE) / (1000 * 60 * 60 * 24));

  const ddayEl = document.getElementById('ddayNumber');
  const descEl = document.getElementById('ddayDesc');
  const coverEl = document.getElementById('coverDday');

  if (diff > 0) {
    ddayEl.textContent = `D-${diff}`;
    descEl.textContent = `2026년 3월 31일 백일 · 태어난 지 ${days}일`;
    coverEl.textContent = `백일까지 D-${diff}`;
  } else if (diff === 0) {
    ddayEl.textContent = `D-DAY`;
    descEl.textContent = `오늘이 백일입니다 🎂`;
    coverEl.textContent = `오늘이 백일이에요 🎂`;
  } else {
    ddayEl.textContent = `${days}일`;
    descEl.textContent = `태어난 지 ${days}일째`;
    coverEl.textContent = `태어난 지 ${days}일`;
  }
}

// ─── API 데이터 로드 ───────────────────────────────────
async function loadHouse() {
  try {
    const res  = await fetch(`/api/house?slug=${HOUSE_SLUG}`);
    const data = await res.json();
    if (!data.house) return;

    houseData = data;
    renderPhotos(data.media || []);
    renderMilestones(data.milestones || []);
    renderComments(data.comments || []);

    document.getElementById('mediaCount').textContent = (data.media || []).length;
  } catch (e) {
    console.error('load error:', e);
  }
}

// ─── 사진 렌더 ─────────────────────────────────────────
function renderPhotos(media) {
  const recentEl = document.getElementById('recentPhotos');
  const allEl    = document.getElementById('allPhotos');
  const photos   = media.filter(m => m.media_type === 'photo');

  if (photos.length === 0) {
    recentEl.innerHTML = `<div class="empty-state" style="grid-column:span 3">
      <div class="icon">📷</div>
      <p>아직 사진이 없어요.<br>첫 번째 사진을 올려주세요!</p>
    </div>`;
    return;
  }

  const photoHtml = (items) => items.map((m, i) => `
    <div class="photo-item" onclick="openPhoto('${m.id}')">
      ${m.file_url
        ? `<img src="${m.file_url}" alt="" loading="lazy">`
        : `<div class="photo-placeholder">📷</div>`
      }
      ${m.content ? `<div class="photo-content">${m.content.slice(0, 60)}...</div>` : ''}
    </div>
  `).join('');

  recentEl.innerHTML = photoHtml(photos.slice(0, 6));
  allEl.innerHTML    = photoHtml(photos);
}

// ─── 마일스톤 렌더 ─────────────────────────────────────
function renderMilestones(milestones) {
  // 기본 마일스톤 (데이터 없으면 기본값)
  const defaults = [
    { title: '태어났어요',   milestone_date: '2025-12-22', icon: '👶', done: true  },
    { title: '백일',         milestone_date: '2026-03-31', icon: '🎂', done: false },
    { title: '첫 뒤집기',    milestone_date: null,         icon: '🔄', done: false },
    { title: '첫 걸음마',    milestone_date: null,         icon: '👣', done: false },
    { title: '첫 단어',      milestone_date: null,         icon: '💬', done: false },
    { title: '첫 번째 생일', milestone_date: '2026-12-22', icon: '🎁', done: false },
  ];

  const items = milestones.length > 0 ? milestones : defaults;

  const html = items.map((m, i) => `
    <div class="milestone-item" style="animation-delay:${i * 0.08}s">
      <div class="milestone-icon">${m.icon || '⭐'}</div>
      <div class="milestone-info">
        <div class="milestone-title">${m.title}</div>
        <div class="milestone-date">${m.milestone_date ? formatDate(m.milestone_date) : '기록 예정'}</div>
      </div>
      <div class="milestone-badge ${m.done || (m.milestone_date && new Date(m.milestone_date) <= new Date()) ? '' : 'pending'}">
        ${m.done || (m.milestone_date && new Date(m.milestone_date) <= new Date()) ? '완료' : '예정'}
      </div>
    </div>
  `).join('');

  document.getElementById('recentMilestones').innerHTML = html;
  document.getElementById('allMilestones').innerHTML    = html;
}

// ─── 댓글 렌더 ─────────────────────────────────────────
function renderComments(comments) {
  const el = document.getElementById('commentList');

  if (comments.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="icon">💌</div>
      <p>아직 방명록이 없어요.<br>하준이에게 첫 인사를 남겨주세요!</p>
    </div>`;
    return;
  }

  el.innerHTML = comments.map(c => `
    <div class="comment-item">
      <div class="comment-header">
        <div class="comment-avatar">${c.author_name[0]}</div>
        <div class="comment-author">${c.author_name}</div>
        <div class="comment-lang">${c.lang === 'ko' ? '🇰🇷' : c.lang === 'vi' ? '🇻🇳' : '🌏'}</div>
      </div>
      <div class="comment-text">${c.content}</div>
      <div class="comment-time">${timeAgo(c.created_at)}</div>
    </div>
  `).join('');
}

// ─── 댓글 제출 ─────────────────────────────────────────
async function submitComment() {
  const author  = document.getElementById('commentAuthor').value.trim();
  const content = document.getElementById('commentText').value.trim();

  if (!author || !content) {
    showToast('이름과 내용을 입력해주세요');
    return;
  }

  try {
    const res = await fetch('/api/comment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        house_id:    houseData?.house?.id,
        author_name: author,
        content
      })
    });

    if (res.ok) {
      document.getElementById('commentAuthor').value = '';
      document.getElementById('commentText').value   = '';
      showToast('방명록이 등록됐어요 💌');
      await loadHouse();
    }
  } catch (e) {
    showToast('오류가 발생했어요');
  }
}

// ─── 사진 모달 ─────────────────────────────────────────
function openPhoto(id) {
  if (!houseData) return;
  const media = houseData.media.find(m => m.id === id);
  if (!media) return;

  document.getElementById('modalPhoto').src       = media.file_url || '';
  document.getElementById('modalContent').textContent = media.content || '';
  document.getElementById('modalDate').textContent = media.event_date
    ? formatDate(media.event_date)
    : timeAgo(media.created_at);

  document.getElementById('photoModal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('photoModal')) {
    document.getElementById('photoModal').classList.remove('open');
  }
}

// ─── 네비 탭 ───────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    item.classList.add('active');
    document.getElementById(`tab-${item.dataset.tab}`).classList.add('active');
  });
});

// ─── 유틸 ──────────────────────────────────────────────
function formatDate(str) {
  const d = new Date(str);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

function timeAgo(str) {
  const diff = Date.now() - new Date(str).getTime();
  const m = Math.floor(diff / 60000);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d > 0) return `${d}일 전`;
  if (h > 0) return `${h}시간 전`;
  if (m > 0) return `${m}분 전`;
  return '방금';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── 초기화 ────────────────────────────────────────────
calcDday();
loadHouse();
</script>
</body>
