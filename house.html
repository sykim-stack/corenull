<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>House</title>

<style>
body{font-family:sans-serif;background:#111;color:#eee}
.card{padding:12px;margin:10px;border-radius:8px;background:#1c1c1c}
h3{margin:0 0 6px}
.row{font-size:14px;opacity:.9}

.pv-comment-trans{font-size:11px;color:#888;margin-top:4px;font-style:italic}

.random-house-btn{
  position:fixed;bottom:20px;right:20px;
  background:#8b5e3c;color:#fff;border:none;
  border-radius:50%;width:50px;height:50px;
  font-size:24px;cursor:pointer;
}
</style>
</head>

<body>

<div id="app"></div>

<button class="random-house-btn" onclick="goRandomHouse()">🎲</button>

<script>
const escapeHtml = str => {
  if (!str) return '';
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
};

const raw = window.HOUSE_DATA || { rooms: [], slug: '' }
const state = { slug: raw.slug || location.pathname.replace(/^\//, '') };

const normalize = d => ({
  rooms: Array.isArray(d.rooms)
    ? d.rooms.map(r => ({
        id: r.id,
        name: r.name ?? '-',
        price: Number(r.price) || 0,
        status: r.status ?? '정보없음',
        comments: Array.isArray(r.comments) ? r.comments : []
      }))
    : []
})

const vmBuild = d => ({
  rooms: d.rooms.map(r => ({
    id: r.id,
    name: r.name,
    fields: [
      ['가격', r.price],
      ['상태', r.status]
    ],
    comments: r.comments
  }))
})

const render = vm => {
  document.getElementById('app').innerHTML =
    vm.rooms.map(r => `
      <div class="card">
        <h3>${escapeHtml(r.name)}</h3>
        ${r.fields.map(([k,v])=>`
          <div class="row">${escapeHtml(k)}: ${escapeHtml(v)}</div>
        `).join('')}
        <div class="pv-comments" style="margin-top:12px;border-top:1px solid #333;padding-top:8px;">
          ${r.comments.length > 0 ? r.comments.map(c => {
            const safeContent = escapeHtml(c.content);
            const safeAuthor = escapeHtml(c.author_name || '익명');
            return `
            <div class="pv-comment-item" id="pvc-${c.id}" style="margin-bottom:8px;">
              <div style="font-size:12px;color:#aaa;">${safeAuthor}</div>
              <div style="font-size:13px;">${safeContent}</div>
              ${
                c.translated_text
                ? `<div class="pv-comment-trans">${escapeHtml(c.translated_text)}</div>`
                : `<div class="pv-comment-trans" id="trans-${c.id}">번역 중...</div>`
              }
            </div>`;
          }).join('')
          : '<div style="font-size:12px;color:#666;">댓글이 없습니다.</div>'}
        </div>
      </div>
    `).join('');

  runBackgroundTranslate(vm);
};

async function runBackgroundTranslate(vm) {
  const targets = [];
  vm.rooms.forEach(r => {
    r.comments.forEach(c => {
      if (!c.translated_text && c.content) {
        targets.push(c);
      }
    });
  });

  for (const c of targets) {
    try {
      const res = await fetch('/api/gemini', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          type:'translate',
          context:{ text:c.content }
        })
      });

      const data = await res.json();

      if (data.translated) {
        const el = document.getElementById(`trans-${c.id}`);
        if (el) el.textContent = data.translated;
      }

    } catch(e) {
      const el = document.getElementById(`trans-${c.id}`);
      if (el) el.textContent = '';
    }
  }
}

async function goRandomHouse() {
  try {
    const res = await fetch('/api/house?action=random');
    const data = await res.json();
    if (data.slug && data.slug !== state.slug) {
      location.href = `/${data.slug}`;
    } else {
      alert('다른 집 없음');
    }
  } catch(e) {
    alert('이동 실패');
  }
}

render(vmBuild(normalize(raw)));
</script>

</body>
</html>
