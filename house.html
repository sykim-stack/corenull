      </div>

<div class="toast" id="toast"></div>

<!-- ── Module Script ── -->
<script type="module">
import {
  state, DEVICE_ID, CAT_META, ROOM_META,
  showToast, openConfirm, closeConfirm, closeModal,
  fmtDate, timeAgo, resizeImg, b64Blob,
  renderPost, renderPostList, renderStoryImgs, escHtml,
} from '/public/js/common.js';

import { loadHouseData, submitPost, deletePost as apiDeletePost } from '/public/js/api.js';
import { renderLobby }   from '/public/tabs/living.js';
import { renderRoom, filterCat, toggleReaction, openPostComment, submitPostComment, deletePostComment, loadReactions } from '/public/tabs/room.js';
import { renderLibrary } from '/public/tabs/library.js';
import { shareHouseKakao, shareHouseZalo, copyLink as coreCopyLink } from '/public/js/core/share.js';
import { sharePost as coreSharePost } from '/public/js/core/share.js';
import { openWriteModal as coreOpenWriteModal, handleWritePhoto, submitWrite as coreSubmitWrite } from '/public/js/features/write.js';
import { previewGbPhoto, submitGuestbook as coreSubmitGuestbook, deleteComment as coreDeleteComment, getAiMsg, translateComment } from '/public/js/features/guestbook.js';
import { toggleInterest, goStepHouse, joinCurrentHouse, skipOnboarding, uploadCover, uploadProfile, openCatMgr } from '/public/js/features/onboard.js';

let pvState = { postId: null, images: [], currentIndex: 0 };

function applyHero(h) {
  if (!h) return;
  state.houseId   = h.id;
  state.houseData = h;
  state.slug      = h.slug;
  document.title  = `${h.name} · CoreNull`;
  document.getElementById('heroName').textContent = h.name;
  document.getElementById('heroSub').textContent  = h.description || '';
  if (h.cover_url)   document.getElementById('coverImg').style.backgroundImage   = `url(${h.cover_url})`;
  if (h.profile_url) document.getElementById('profilePhoto').style.backgroundImage = `url(${h.profile_url})`;
  else document.getElementById('profilePlaceholder').style.display = 'flex';

  if (state.isOwner) {
    document.getElementById('profilePhoto').onclick = () => document.getElementById('profileInput').click();
    document.getElementById('coverImg').onclick     = () => document.getElementById('coverInput').click();
  }
}

function initDday(h) {
  const wrap = document.getElementById('ddayWrap');
  if (!h.dday_date) { wrap.style.display = 'none'; return; }
  const diff = Math.ceil((new Date() - new Date(h.dday_date)) / (1000 * 60 * 60 * 24));
  wrap.textContent = `${h.dday_label || '함께한 지'} ${diff}일`;
}

function buildTabs(h, rooms, milestones, comments) {
  const tabs = document.getElementById('topTabs');
  const acts = document.getElementById('topActions');
  tabs.innerHTML = ''; acts.innerHTML = '';

  const addTab = (id, label, active) => {
    const b = document.createElement('button');
    b.className = `top-tab ${active ? 'active' : ''}`;
    b.textContent = label;
    b.onclick = () => switchTab(id);
    tabs.appendChild(b);
  };
  addTab('living', '거실', true);
  rooms.forEach(r => addTab(`room_${r.id}`, r.name));
  addTab('library', '서재');

  if (state.isOwner) {
    const setBtn = document.createElement('button');
    setBtn.className = 'top-action-btn';
    setBtn.innerHTML = '⚙️';
    setBtn.onclick = () => location.href = `/manage?slug=${state.slug}`;
    acts.appendChild(setBtn);
  }
  switchTab('living');
}

function switchTab(tabId) {
  document.querySelectorAll('.top-tab').forEach(b => {
    b.classList.toggle('active', b.textContent === (tabId === 'living' ? '거실' : tabId === 'library' ? '서재' : state.rooms.find(r => `room_${r.id}` === tabId)?.name));
  });
  const cont = document.getElementById('tabContents');
  cont.innerHTML = '';
  if (tabId === 'living') renderLobby(cont, state.houseData, state.milestones, state.comments);
  else if (tabId === 'library') renderLibrary(cont, state.houseData, state.allPosts);
  else {
    const roomId = tabId.replace('room_', '');
    renderRoom(cont, roomId);
  }
  window.scrollTo(0, 0);
}

function switchToRoomType(type) {
  const r = state.rooms.find(x => x.room_type === type);
  if (r) switchTab(`room_${r.id}`);
}

async function openPostModal(postId) {
  const post = (state.allPosts || []).find(p => p.id === postId);
  if (!post) return;
  pvState.postId = postId;
  pvState.images = post.media_urls || [];
  pvState.currentIndex = 0;

  const modal = document.getElementById('postModal');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  document.getElementById('pvAuthorName').textContent = state.houseData?.name || '익명';
  document.getElementById('pvDate').textContent = timeAgo(post.created_at);
  document.getElementById('pvText').innerHTML = post.content.replace(/\n/g, '<br>');
  document.getElementById('pvTags').innerHTML = (post.category_ids || []).map(cid => {
    const c = state.categories.find(x => x.id === cid);
    return c ? `<span class="pv-tag">#${c.name}</span>` : '';
  }).join('');

  const media = document.getElementById('pvMedia');
  media.innerHTML = '';
  if (pvState.images.length > 0) {
    pvState.images.forEach((url, i) => {
      const img = document.createElement('img');
      img.src = url;
      img.style.display = i === 0 ? 'block' : 'none';
      media.appendChild(img);
    });
    if (pvState.images.length > 1) {
      const prev = document.createElement('button');
      prev.className = 'pv-nav prev'; prev.innerHTML = '‹'; prev.onclick = () => pvNav(-1);
      const next = document.createElement('button');
      next.className = 'pv-nav next'; next.innerHTML = '›'; next.onclick = () => pvNav(1);
      media.appendChild(prev); media.appendChild(next);
    }
  }

  loadReactions(postId, document.getElementById('pvReactBtn'));
  await pvLoadComments();
}

function pvNav(dir) {
  const imgs = document.querySelectorAll('#pvMedia img');
  if (imgs.length <= 1) return;
  imgs[pvState.currentIndex].style.display = 'none';
  pvState.currentIndex = (pvState.currentIndex + dir + imgs.length) % imgs.length;
  imgs[pvState.currentIndex].style.display = 'block';
}

async function pvLoadComments() {
  const el = document.getElementById('pvComments');
  el.innerHTML = '<div class="pv-comments-loading">불러오는 중...</div>';
  try {
    const res  = await fetch(`/api/comment?post_id=${pvState.postId}&house_id=${state.houseId}`);
    const data = await res.json();
    const list = Array.isArray(data) ? data : [];
    if (list.length === 0) { el.innerHTML = '<div class="pv-comments-empty">첫 댓글을 남겨보세요 💬</div>'; return; }
    el.innerHTML = list.map(c => `
      <div class="pv-comment-item" id="pvc-${c.id}">
        <div class="pv-comment-av">${(c.author_name || '?').charAt(0)}</div>
        <div class="pv-comment-bubble">
          <div class="pv-comment-name">${escHtml(c.author_name)}</div>
          <div class="pv-comment-text" id="pvc-text-${c.id}">${escHtml(c.content)}</div>
          ${c.translated_text
            ? `<div class="pv-comment-trans" id="pvc-trans-${c.id}" style="display:none;font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;">${escHtml(c.translated_text)}</div>
               <button class="pv-trans-btn" onclick="pvToggleTrans('${c.id}','${escHtml(c.content)}','${escHtml(c.translated_text || '')}')" style="background:none;border:none;font-size:10px;color:var(--brown);cursor:pointer;padding:2px 0;opacity:.7;">🌐 번역 보기</button>`
            : `<button class="pv-trans-btn" onclick="pvTranslate('${c.id}','${escHtml(c.content)}')" style="background:none;border:none;font-size:10px;color:var(--brown);cursor:pointer;padding:2px 0;opacity:.7;">🌐 번역</button>`
          }
          <div class="pv-comment-time">${timeAgo(c.created_at)}</div>
        </div>
        ${state.isOwner ? `<button class="pv-comment-del" onclick="pvDeleteComment('${c.id}')">🗑️</button>` : ''}
      </div>`).join('');
  } catch(e) { el.innerHTML = '<div class="pv-comments-empty">댓글을 불러오지 못했어요</div>'; }
}

function closePvModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('postModal').classList.remove('open');
  document.body.style.overflow = '';
  pvState.postId = null;
}

function pvFocusComment() { document.getElementById('pvCommentInput').focus(); }

let lbState = { images: [], index: 0 };
function openLightbox(imgs, idx) {
  lbState.images = imgs; lbState.index = idx;
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  renderLb();
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function lbPrev() { lbState.index = (lbState.index - 1 + lbState.images.length) % lbState.images.length; renderLb(); }
function lbNext() { lbState.index = (lbState.index + 1) % lbState.images.length; renderLb(); }
function lbGoTo(i) { lbState.index = i; renderLb(); }
function renderLb() {
  const track = document.getElementById('lbTrack');
  track.innerHTML = `<img src="${lbState.images[lbState.index]}">`;
  document.getElementById('lbCounter').textContent = `${lbState.index + 1} / ${lbState.images.length}`;
  const thumbs = document.getElementById('lbThumbs');
  thumbs.innerHTML = lbState.images.map((img, i) => `<div class="lb-thumb ${i === lbState.index ? 'active' : ''}" onclick="lbGoTo(${i})" style="background-image:url(${img})"></div>`).join('');
}

function toggleFabSheet() {
  const open = document.getElementById('fabSheet').classList.toggle('open');
  document.getElementById('fabBackdrop').classList.toggle('open', open);
  const fab = document.getElementById('fab');
  if (open) { fab.classList.add('sheet-open'); fab.textContent = '✕'; }
  else { fab.classList.remove('sheet-open'); fab.textContent = '✏️'; }
}

function closeFabSheet() {
  document.getElementById('fabSheet')?.classList.remove('open');
  document.getElementById('fabBackdrop')?.classList.remove('open');
  const fab = document.getElementById('fab');
  if (fab) { fab.classList.remove('sheet-open'); fab.textContent = '✏️'; }
}

window.openEventEditModal = (id, name, date) => {
  document.getElementById('eventEditId').value   = id;
  document.getElementById('eventEditName').value = name;
  document.getElementById('eventEditDate').value = date || '';
  document.getElementById('eventEditModal').classList.add('open');
};

// ── INIT ──
async function reloadData() {
  try {
    const data = await loadHouseData();
    applyHero(data.house);
    buildTabs(data.house, data.rooms || [], data.milestones || [], data.comments || []);
  } catch (e) { console.error('reloadData 실패', e); }
}

async function init() {
  try {
    const data = await loadHouseData();
    applyHero(data.house);
    initDday(data.house);
    buildTabs(data.house, data.rooms || [], data.milestones || [], data.comments || []);
    trackVisit(data.house.id);
    window._reloadData = reloadData;
    if (state.isOwner) document.getElementById('fab').style.display = 'flex';
    window.__ke_house_id = state.houseId;
  } catch (e) {
    console.error(e);
    showToast('데이터를 불러오지 못했어요');
  }
}

function trackVisit(houseId) {
  const ref        = new URLSearchParams(location.search).get('ref') || 'direct';
  const invited_by = ref.startsWith('dev_') ? ref : null;
  fetch('/api/house', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-device-id': DEVICE_ID },
    body: JSON.stringify({ house_id: houseId, room_id: null, ref, invited_by })
  }).catch(() => {});
}

window.submitEventEdit = async () => {
  const id   = document.getElementById('eventEditId').value;
  const name = document.getElementById('eventEditName').value.trim();
  const date = document.getElementById('eventEditDate').value || null;
  if (!name) { showToast('이름을 입력해주세요'); return; }
  if (!date) { showToast('날짜를 선택해주세요'); return; }

  const res  = await fetch('/api/categories', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'Content-Profile': 'corenull' },
    body: JSON.stringify({ category_id: id, house_id: state.houseId, name, event_date: date })
  });
  const data = await res.json();
  if (data.success) {
    const cat = state.categories.find(c => String(c.id) === String(id));
    if (cat) { cat.name = name; cat.event_date = date; }
    document.getElementById('eventEditModal').classList.remove('open');
    showToast('수정됐어요 ✅');
    if (typeof window._reloadData === 'function') window._reloadData();
  } else {
    showToast(data.error || '수정 실패');
  }
};

window.deleteEventCat = async () => {
  const id = document.getElementById('eventEditId').value;
  const name = document.getElementById('eventEditName').value;
  if (!confirm(`"${name}" 이벤트를 삭제할까요?`)) return;

  const res  = await fetch('/api/categories', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json', 'Content-Profile': 'corenull' },
    body: JSON.stringify({ category_id: id, house_id: state.houseId })
  });
  const data = await res.json();
  if (data.success) {
    state.categories = state.categories.filter(c => String(c.id) !== String(id));
    document.getElementById('eventEditModal').classList.remove('open');
    showToast('삭제됐어요 🗑️');
    if (typeof window._reloadData === 'function') window._reloadData();
  } else {
    showToast(data.error || '삭제 실패');
  }
};

async function pvSubmitComment() {
  const input   = document.getElementById('pvCommentInput');
  const content = input?.value.trim();
  if (!content || !pvState.postId) return;
  const author = localStorage.getItem('cn_author_name') || '익명';
  input.value = ''; input.disabled = true;
  try {
    const res  = await fetch('/api/comment', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ house_id: state.houseId, author_name: author, content, post_id: pvState.postId }) });
    const data = await res.json();
    if (data.success) {
      await pvLoadComments();
      const btn = document.querySelector(`[data-comment-id="${pvState.postId}"]`);
      if (btn) { const cur = parseInt(btn.dataset.count || '0') + 1; btn.dataset.count = cur; btn.innerHTML = `💬 ${cur}`; }
    } else showToast(data.error || '댓글 등록 실패');
  } catch(e) { showToast('댓글 등록 실패'); }
  finally { input.disabled = false; input.focus(); }
}

async function pvDeleteComment(commentId) {
  try {
    const res  = await fetch('/api/comment', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ comment_id: commentId, house_id: state.houseId }) });
    const data = await res.json();
    if (data.success) await pvLoadComments();
    else showToast(data.error || '삭제 실패');
  } catch(e) { showToast('삭제 실패'); }
}

async function submitEdit() {
  const mediaId = document.getElementById('editMediaId').value;
  const content = document.getElementById('editContent').value.trim();
  const res = await fetch('/api/media', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ media_id: mediaId, house_id: state.houseId, owner_key: state.ownerKey, content }) });
  const data = await res.json();
  if (data.success) { showToast('수정됐어요 ✅'); document.getElementById('editModal').classList.remove('open'); await reloadData(); }
  else showToast(data.error || '수정 실패');
}

async function submitVideo() {
  const url = document.getElementById('videoUrlInput').value.trim();
  if (!url) { showToast('링크를 입력해주세요'); return; }
  const res  = await fetch('/api/upload', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ house_id: state.houseId, owner_key: state.ownerKey, room_id: null, file_urls: [url], media_type: 'video' }) });
  const data = await res.json();
  if (data.success) { showToast('영상이 추가됐어요 🎬'); document.getElementById('videoModal').classList.remove('open'); await reloadData(); }
  else showToast(data.error || '추가 실패');
}

function confirmDelMedia(mediaId) {
  openConfirm('삭제할까요?', '삭제하면 되돌릴 수 없어요.', async () => {
    const res  = await fetch('/api/upload', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ media_id: mediaId, house_id: state.houseId, owner_key: state.ownerKey }) });
    const data = await res.json();
    if (data.success) { showToast('삭제됐어요'); await reloadData(); }
    else showToast(data.error || '삭제 실패');
  });
}

async function deletePost(postId) {
  openConfirm('글을 삭제할까요?', '삭제하면 되돌릴 수 없어요.', async () => {
    const data = await apiDeletePost(postId);
    if (data.success) { showToast('삭제됐어요'); await reloadData(); }

}

// ── 댓글 번역 (on-demand fallback) ──
async function pvTranslate(commentId, content) {
  const btn = document.querySelector(`#pvc-${commentId} .pv-trans-btn`);
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
  try {
    const res = await fetch('/api/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'translate', context: { text: content } })
    });
    const data = await res.json();
    if (data.translated) {
      const bubble = document.querySelector(`#pvc-${commentId} .pv-comment-bubble`);
      if (bubble) {
        const transDiv = document.createElement('div');
        transDiv.id = `pvc-trans-${commentId}`;
        transDiv.style.cssText = 'font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;';
        transDiv.textContent = data.translated;
        if (btn) btn.replaceWith(transDiv);
        const time = bubble.querySelector('.pv-comment-time');
        bubble.insertBefore(transDiv, time);
      }
    } else {
      if (btn) { btn.textContent = '🌐 번역'; btn.disabled = false; }
      showToast('번역 실패');
    }
  } catch(e) {
    if (btn) { btn.textContent = '🌐 번역'; btn.disabled = false; }
  }
}

// ── 번역 토글 (cached) ──
function pvToggleTrans(commentId, original, translated) {
  const textEl  = document.getElementById(`pvc-text-${commentId}`);
  const transEl = document.getElementById(`pvc-trans-${commentId}`);
  const btn     = document.querySelector(`#pvc-${commentId} .pv-trans-btn`);
  if (!transEl) return;
  const showing = transEl.style.display !== 'none';
  transEl.style.display = showing ? 'none' : 'block';
  if (btn) btn.textContent = showing ? '🌐 번역 보기' : '🌐 원문 보기';
}

  try {
    const res = await fetch('/api/house?action=random');
    const data = await res.json();
    if (data.slug && data.slug !== state.slug) {
      window.location.href = `/${data.slug}`;
    } else {
      showToast('아직 다른 집이 없어요 🏠', 'info');
    }
  } catch(e) {
    showToast('이동 실패', 'error');
  }
}
