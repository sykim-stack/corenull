<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>House</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background:#111; color:#eee; margin:0;
}
.header {
  padding:20px 16px;
  border-bottom:1px solid #222;
}
.title { font-size:18px; font-weight:700; }
.desc { font-size:12px; color:#666; }

.post-list { padding:12px; }

.card {
  background:#1c1c1c;
  border-radius:12px;
  margin-bottom:12px;
  overflow:hidden;
}

.content {
  padding:14px;
  line-height:1.6;
}

.images {
  display:flex; gap:6px; padding:0 14px 10px;
}
.images img {
  width:80px; height:80px;
  object-fit:cover; border-radius:6px;
}

.meta {
  padding:6px 14px;
  font-size:11px; color:#777;
}

.comments {
  border-top:1px solid #222;
  padding:10px 14px;
}

.comment {
  font-size:13px;
  margin-bottom:6px;
}

.input-row {
  display:flex; gap:6px; margin-top:6px;
}
.input-row input {
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}
.input-row button {
  padding:8px 10px;
  border:none;
  background:#8b5e3c;
  color:#fff;
  border-radius:8px;
}

.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#8b5e3c;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<div id="app">로딩중...</div>

<button class="fab" onclick="goRandom()">🎲</button>

<script>

let posts = [];
let house = null;

// ── 데이터 로드 ─────────────────
async function load() {
  const slug = location.pathname.replace('/','') || 'hajun';

  try {
    const res = await fetch('/api/house?slug='+slug);
    const data = await res.json();

    house = data.house;

    // 🔥 핵심: comments 합치기
    posts = (data.posts || []).map(p => ({
      ...p,
      comments: (data.comments || []).filter(c => c.post_id === p.id)
    }));

    console.log('posts:', posts); // 확인용

    render();

  } catch(e) {
    document.getElementById('app').innerHTML = '로드 실패';
  }
}

// ── 렌더 ─────────────────
function render() {
  let html = '';

  html += `
    <div class="header">
      <div class="title">${house?.name || ''}</div>
      <div class="desc">${house?.description || ''}</div>
    </div>
  `;

  html += `<div class="post-list">`;
  html += posts.map(renderCard).join('');
  html += `</div>`;

  document.getElementById('app').innerHTML = html;
}

// ── 카드 ─────────────────
function renderCard(p) {

  const imgs = (p.media_urls || []).map(u =>
    `<img src="${u}">`
  ).join('');

  const comments = (p.comments || []).map(c =>
    `<div class="comment">${c.content}</div>`
  ).join('');

  return `
    <div class="card">
      <div class="content">${p.content}</div>
      ${imgs ? `<div class="images">${imgs}</div>` : ''}
      <div class="meta">${time(p.created_at)}</div>
      <div class="comments">
        ${comments}
        <div class="input-row">
          <input placeholder="댓글..." onkeydown="if(event.key==='Enter') addComment('${p.id}',this)">
          <button onclick="addComment('${p.id}',this.previousElementSibling)">등록</button>
        </div>
      </div>
    </div>
  `;
}

// ── 댓글 ─────────────────
async function addComment(postId, input) {
  const text = input.value.trim();
  if (!text) return;

  input.disabled = true;

  const res = await fetch('/api/house?action=add_comment', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
  house_id: house.id,
  post_id: postId,
  content: text
})

  });

  const data = await res.json();

  console.log('응답:', data); // 🔥 무조건 찍힘

  if (data.success) {
    const p = posts.find(p => p.id === postId);
    p.comments = p.comments || [];
    p.comments.push(data.comment);

    input.value = '';
    input.disabled = false;

    render();
  } else {
    alert(JSON.stringify(data)); // 🔥 실패 이유 바로 보임
    input.disabled = false;
  }
}

// ── 랜덤 이동 ─────────────────
async function goRandom() {
  const res = await fetch('/api/house?slug=__random__');
  const data = await res.json();

  if (data.house?.slug) {
    location.href = '/'+data.house.slug;
  }
}

// ── 시간 포맷 ─────────────────
function time(t) {
  return new Date(t).toLocaleDateString('ko-KR');
}

// ── 시작 ─────────────────
load();

</script>
<script src="https://hajunai-v2.vercel.app/js/brainpool-debug.js"></script>
</body>
</html>
