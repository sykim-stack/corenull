<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>집 · CoreNull</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
  <script>Kakao.init('deff4cdd41db40e09d6a4ca2a3c9f628');</script>

  <style>
    /* ── 변수: THE BLACK IDENTITY ─────────────────────────────────── */
    :root {
      --bg: #0A0A0A; /* Deep Black */
      --surface: #1A1A1A; /* Dark Surface */
      --glass: rgba(255, 255, 255, 0.05); /* Glassmorphism */
      --accent: #F2C4A0; /* CoreRing Peach Accent */
      --text: #FDF8F3; /* Off White */
      --muted: #888888; /* Gray */
      --border: rgba(255, 255, 255, 0.1);
      --neon: #F2C4A0;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Gowun Dodum',serif;min-height:100vh;overflow-x:hidden;}

    /* ── 애니메이션 ──────────────────────────────────────────────── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes barcodeFlow{0%{height:0;}100%{height:100%;}}
    @keyframes neonGlow{0%,100%{text-shadow:0 0 10px var(--neon), 0 0 20px var(--neon);}50%{text-shadow:0 0 15px var(--neon), 0 0 30px var(--neon);}}

    /* ── 공통 유틸 ───────────────────────────────────────────────── */
    .hidden{display:none!important;}
    .empty{text-align:center;padding:40px 24px;color:var(--muted);}
    .section{max-width:1280px;margin:0 auto;padding:40px 24px;}
    .sec-label{font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
    .sec-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:600;color:var(--accent);}
    .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .more-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;color:var(--accent);cursor:pointer;font-family:'Gowun Dodum',serif;}
    .more-btn:hover{background:var(--glass);border-color:var(--accent);}

    /* ── N-BARCODE HEADER ────────────────────────────────────────── */
    .barcode-header{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:200;}
    .n-barcode{display:flex;gap:2px;height:24px;align-items:flex-end;}
    .n-barcode span{width:2px;background:var(--accent);animation:barcodeFlow 0.8s ease-out forwards;}
    .n-barcode span:nth-child(2){width:4px;height:18px;}
    .n-barcode span:nth-child(3){width:1px;height:22px;}
    .n-barcode span:nth-child(4){width:3px;height:14px;}
    .logo-text{font-family:'Noto Serif KR',serif;font-weight:700;letter-spacing:4px;color:var(--text);font-size:18px;}

    /* ── HERO ────────────────────────────────────────────────────── */
    .hero{min-height:70vh;background:var(--bg);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px 40px;overflow:hidden;}
    .hero::before{content:'';position:absolute;width:300px;height:300px;background:var(--accent);filter:blur(150px);opacity:0.1;top:20%;left:50%;transform:translateX(-50%);}
    .photo-frame{width:140px;height:140px;border-radius:50%;background:var(--surface);border:2px solid var(--border);box-shadow:0 0 40px rgba(242,196,160,0.1);margin-bottom:24px;overflow:hidden;position:relative;animation:fadeUp .8s .2s ease both;}
    .photo-frame img{width:100%;height:100%;object-fit:cover;}
    .hero-name{font-family:'Noto Serif KR',serif;font-size:48px;font-weight:700;color:var(--text);letter-spacing:8px;margin-bottom:8px;animation:fadeUp .8s .3s ease both;}
    .hero-sub{font-size:13px;letter-spacing:3px;color:var(--muted);margin-bottom:32px;animation:fadeUp .8s .4s ease both;}
    .dday-wrap{display:flex;gap:16px;animation:fadeUp .8s .5s ease both;}
    .dday-box{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:16px 20px;text-align:center;min-width:80px;}
    .dday-num{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:600;color:var(--accent);line-height:1;}
    .dday-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-top:4px;}

    /* ── TAB NAV ─────────────────────────────────────────────────── */
    .tab-nav{position:sticky;top:60px;z-index:100;background:rgba(10,10,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;justify-content:center;}
    .tab-inner{display:flex;max-width:1280px;width:100%;overflow-x:auto;scrollbar-width:none;}
    .tab-btn{flex:1;min-width:64px;padding:16px 4px;background:none;border:none;font-family:'Gowun Dodum',serif;font-size:11px;color:var(--muted);cursor:pointer;letter-spacing:2px;border-bottom:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

    /* ── LOBBY / CARDS ─────────────────────────────────────────── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:24px;margin-bottom:24px;transition:transform 0.3s, border-color 0.3s;}
    .card:hover{border-color:var(--accent);transform:translateY(-4px);}
    .photo-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:28px;}
    .ps-cell{aspect-ratio:1;border-radius:16px;overflow:hidden;cursor:pointer;background:var(--glass);border:1px solid var(--border);}
    .ps-cell img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}

    /* ── FEED ───────────────────────────────────────── */
    .feed-item{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px;animation:fadeUp .4s ease both;}
    .feed-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .feed-av{width:40px;height:40px;border-radius:50%;background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--accent);font-weight:700;border:1px solid var(--border);}
    .feed-name{font-size:14px;font-weight:600;color:var(--text);}
    .feed-body{font-size:14px;line-height:1.8;color:var(--text);margin-bottom:12px;}
    .feed-time{font-size:11px;color:var(--muted);}

    /* ── FORM ───────────────────────────────────────── */
    .gb-form{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:24px;}
    .gb-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px;font-family:'Gowun Dodum',serif;font-size:13px;color:var(--text);outline:none;margin-bottom:12px;transition:border-color 0.2s;}
    .gb-input:focus{border-color:var(--accent);}
    .gb-submit{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:14px;padding:14px;font-family:'Gowun Dodum',serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
    .gb-submit:hover{opacity:0.9;}

    /* ── MODALS ─────────────────────────────────────────────── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:28px;width:100%;max-width:440px;padding:32px;animation:fadeUp 0.4s ease both;}
    .modal-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--accent);margin-bottom:20px;}

    /* ── FAB ────────────────────────────────────────────────────── */
    .fab{position:fixed;bottom:32px;right:32px;width:60px;height:60px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:24px;color:var(--bg);box-shadow:0 0 30px rgba(242,196,160,0.3);cursor:pointer;z-index:300;transition:transform 0.3s;}
    .fab:hover{transform:scale(1.1) rotate(90deg);}

    /* ── TOAST ──────────────────────────────────────────────────── */
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);padding:12px 24px;border-radius:30px;font-size:13px;font-weight:700;z-index:2000;opacity:0;pointer-events:none;transition:all 0.3s;}
    .toast.show{bottom:120px;opacity:1;}

    /* ── LIGHTBOX / POST VIEWER ─────────────────────────────────── */
    .pv-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;z-index:1000;overflow-y:auto;}
    .pv-overlay.open{display:block;}
    .pv-box{max-width:1000px;margin:40px auto;background:var(--surface);border-radius:24px;overflow:hidden;display:flex;flex-direction:column;}
    @media(min-width:768px){ .pv-box{flex-direction:row; height:80vh;} .pv-media{flex:1.5; background:#000; display:flex; align-items:center; justify-content:center; position:relative;} .pv-panel{width:400px; border-left:1px solid var(--border); overflow-y:auto;} }
    .pv-media img{max-width:100%; max-height:100%; object-fit:contain;}
    .pv-panel{padding:24px; display:flex; flex-direction:column; gap:20px;}
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     HEADER: N-BARCODE
════════════════════════════════════════════════════ -->
<header class="barcode-header">
  <div class="n-barcode">
    <span style="height:22px;"></span>
    <span style="height:14px;"></span>
    <span style="height:24px;"></span>
    <span style="height:18px;"></span>
    <span style="height:20px;"></span>
  </div>
  <div class="logo-text">CORENULL</div>
  <div style="width:24px;"></div> <!-- Spacer -->
</header>

<!-- ═══════════════════════════════════════════════════
     HERO
════════════════════════════════════════════════════ -->
<section class="hero" id="hero">
  <div class="photo-frame" id="heroFrame">
    <div id="heroPlaceholder" style="font-size:60px;display:flex;align-items:center;justify-content:center;height:100%;">🏠</div>
  </div>
  <input type="file" id="coverInput" accept="image/*" style="display: none;">
  
  <div id="heroBadge" class="sec-label" style="color:var(--accent);margin-bottom:16px;">LOADING...</div>
  <h1 class="hero-name" id="heroName">---</h1>
  <p class="hero-sub" id="heroSub">---</p>

  <div class="dday-wrap" id="ddayWrap"></div>
</section>

<!-- ═══════════════════════════════════════════════════
     TAB NAV
════════════════════════════════════════════════════ -->
<nav class="tab-nav">
  <div class="tab-inner" id="tabInner"></div>
</nav>

<main id="tabContents"></main>

<!-- ═══════════════════════════════════════════════════
     FAB & MODALS
════════════════════════════════════════════════════ -->
<div class="fab" id="fab" onclick="openWriteModal()">+</div>

<div class="modal-overlay" id="writeModal" onclick="closeModal('writeModal',event)">
  <div class="modal-box">
    <div class="modal-title">새 기록 남기기 📝</div>
    <textarea class="gb-input" id="writeContent" placeholder="오늘의 이야기를 들려주세요..." style="height:120px;"></textarea>
    <div id="writeCatWrap" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"></div>
    <button class="gb-submit" onclick="submitWrite()">기록하기</button>
  </div>
</div>

<div class="confirm-overlay modal-overlay" id="confirmOverlay">
  <div class="modal-box" style="text-align:center;">
    <div class="modal-title" id="confirmTitle">삭제할까요?</div>
    <p style="color:var(--muted);margin-bottom:24px;" id="confirmSub">삭제하면 되돌릴 수 없어요.</p>
    <div style="display:flex;gap:12px;">
      <button class="gb-submit" style="background:var(--glass);color:var(--text);" onclick="closeConfirm()">취소</button>
      <button class="gb-submit" id="confirmOk">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
/* ─────────────────────────────────────────────────
   STATE & INIT
───────────────────────────────────────────────── */
const S = {
  slug: location.pathname.replace(/^\//, '') || 'hajun',
  ownerKey: new URLSearchParams(location.search).get('owner'),
  isOwner: false,
  houseId: null,
  house: null,
  rooms: [],
  categories: [],
  posts: [],
  media: [],
  milestones: [],
  comments: [],
  activeCat: null,
};

const DEVICE_ID = (() => {
  let id = localStorage.getItem('cn_device_id');
  if (!id) { id = 'dev_' + Date.now(); localStorage.setItem('cn_device_id', id); }
  return id;
})();

/* ─────────────────────────────────────────────────
   UTILS
───────────────────────────────────────────────── */
function showToast(msg) { const t=document.getElementById('toast'); if(t){ t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); } }
function openConfirm(title,sub,onOk) { 
  const t=document.getElementById('confirmTitle'), s=document.getElementById('confirmSub'), ok=document.getElementById('confirmOk'), ov=document.getElementById('confirmOverlay');
  if(t) t.textContent=title; if(s) s.textContent=sub; if(ok) ok.onclick=()=>{closeConfirm();onOk();}; if(ov) ov.classList.add('open'); 
}
function closeConfirm() { document.getElementById('confirmOverlay')?.classList.remove('open'); }
function closeModal(id,e) { if(!e||e.target===document.getElementById(id)) document.getElementById(id)?.classList.remove('open'); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(str) { const diff=Date.now()-new Date(str).getTime(); const m=Math.floor(diff/60000),h=Math.floor(m/60),d=Math.floor(h/24); if(d>0) return `${d}일 전`; if(h>0) return `${h}시간 전`; if(m>0) return `${m}분 전`; return '방금'; }

window.closeModal = closeModal;
window.closeConfirm = closeConfirm;

/* ─────────────────────────────────────────────────
   CORE LOGIC
───────────────────────────────────────────────── */
async function init() {
  // Safe Event Binding (에러 방지용 체크 추가)
  const coverInput = document.getElementById('coverInput');
  if (coverInput) coverInput.addEventListener('change', handleCoverChange);

  await loadData();
  applyHero();
  initDday();
  buildTabs();
}
init();

async function loadData() {
  try {
    const ownerParam = S.ownerKey ? `&owner=${encodeURIComponent(S.ownerKey)}` : '';
    const res = await fetch(`/api/house?slug=${S.slug}${ownerParam}`);
    const data = await res.json();
    if (!data.house) { showToast('집을 찾을 수 없어요'); return; }
    
    S.house = data.house;
    S.houseId = data.house.id;
    S.isOwner = !!data.house.is_owner;
    S.rooms = data.rooms || [];
    S.categories = data.categories || [];
    S.posts = data.posts || [];
    S.media = data.media || [];
    S.comments = data.comments || [];

    if (S.isOwner) {
      const fab = document.getElementById('fab'); if(fab) fab.style.display='flex';
      const frame = document.getElementById('heroFrame'); if(frame) frame.onclick=()=>document.getElementById('coverInput')?.click();
    }
  } catch(e) { console.error(e); showToast('데이터 로드 실패'); }
}

function applyHero() {
  const h = S.house; if(!h) return;
  document.getElementById('heroBadge').textContent = h.category?.toUpperCase() || 'CORENULL';
  document.getElementById('heroName').textContent = h.name || S.slug;
  document.getElementById('heroSub').textContent = h.description || '';
  if (h.cover_url) {
    document.getElementById('heroFrame').innerHTML = `<img src="${h.cover_url}" alt="${escHtml(h.name)}">`;
  }
}

function initDday() {
  const h = S.house; if(!h || (!h.birth_date && !h.start_date)) return;
  const start = new Date(h.birth_date || h.start_date), now = new Date();
  const elapsed = Math.floor((now - start) / 86400000);
  const wrap = document.getElementById('ddayWrap');
  if(wrap) wrap.innerHTML = `<div class="dday-box"><div class="dday-num">${elapsed}일</div><div class="dday-label">함께한 시간</div></div>`;
}

function buildTabs() {
  const tabInner = document.getElementById('tabInner'), tabContents = document.getElementById('tabContents');
  if(!tabInner || !tabContents) return;
  tabInner.innerHTML = ''; tabContents.innerHTML = '';

  const ORDER = ['living','room','library'];
  const ordered = ORDER.map(type => S.rooms.find(r=>r.room_type===type)).filter(Boolean);

  ordered.forEach((room, idx) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx===0?' active':'');
    btn.innerHTML = `<span>${room.room_type==='living'?'🛋️':room.room_type==='room'?'🚪':'📚'}</span>${room.room_name}`;
    btn.onclick = () => switchTab(room.id, btn);
    tabInner.appendChild(btn);

    const div = document.createElement('div');
    div.className = 'tab-content' + (idx===0?' active':'');
    div.id = `tab-${room.id}`;
    if (idx !== 0) div.style.display = 'none';
    tabContents.appendChild(div);

    if (room.room_type==='living') renderLiving(div);
    else if (room.room_type==='room') renderRoom(div, room);
    else if (room.room_type==='library') renderLibrary(div);
  });
}

function switchTab(roomId, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
  const target = document.getElementById(`tab-${roomId}`);
  if(target) target.style.display='block';
}

/* ─────────────────────────────────────────────────
   RENDERERS
───────────────────────────────────────────────── */
function renderLiving(container) {
  const photos = S.media.filter(m=>m.media_type==='photo').slice(0,3);
  const photoHtml = photos.length 
    ? photos.map(m=>`<div class="ps-cell"><img src="${m.file_url}"></div>`).join('')
    : `<div style="grid-column:span 3;text-align:center;color:var(--muted);padding:20px;">사진이 아직 없어요</div>`;

  container.innerHTML = `
    <div class="section">
      <div class="card">
        <div class="sec-label">RECENT PHOTOS</div>
        <div class="photo-strip">${photoHtml}</div>
      </div>
      <div class="sec-head">
        <div class="sec-title">방명록 💌</div>
      </div>
      <div class="feed-list">
        ${S.comments.map(c=>`
          <div class="feed-item">
            <div class="feed-head">
              <div class="feed-av">${(c.author_name||'?')[0]}</div>
              <div class="feed-name">${escHtml(c.author_name)}</div>
            </div>
            <div class="feed-body">${escHtml(c.content)}</div>
            <div class="feed-time">${timeAgo(c.created_at)}</div>
          </div>
        `).join('') || '<div class="empty">메시지가 없습니다</div>'}
      </div>
      <div class="gb-form">
        <input type="text" class="gb-input" id="gbAuthor" placeholder="이름">
        <textarea class="gb-input" id="gbContent" placeholder="따뜻한 한마디를 남겨주세요" style="height:80px;"></textarea>
        <button class="gb-submit" onclick="submitGuestbook()">남기기</button>
      </div>
    </div>`;
}

function renderRoom(container, room) {
  const posts = S.posts.filter(p=>p.room_id===room.id);
  container.innerHTML = `
    <div class="section">
      <div class="sec-head">
        <div class="sec-title">${room.room_name} 📝</div>
      </div>
      <div class="feed-list">
        ${posts.map(p=>`
          <div class="feed-item">
            <div class="feed-body">${escHtml(p.content)}</div>
            <div class="feed-time">${timeAgo(p.created_at)}</div>
          </div>
        `).join('') || '<div class="empty">기록이 없습니다</div>'}
      </div>
    </div>`;
}

function renderLibrary(container) {
  const photos = S.media.filter(m=>m.media_type==='photo');
  container.innerHTML = `
    <div class="section">
      <div class="sec-head">
        <div class="sec-title">갤러리 📷</div>
      </div>
      <div class="photo-strip" style="grid-template-columns:repeat(auto-fill, minmax(100px, 1fr));">
        ${photos.map(m=>`<div class="ps-cell"><img src="${m.file_url}"></div>`).join('') || '<div class="empty">사진이 없습니다</div>'}
      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────
   ACTIONS
───────────────────────────────────────────────── */
async function handleCoverChange() {
  showToast('업로드 중...');
  // Cloudinary upload logic would go here
  showToast('디자인 리뉴얼 모드에서는 업로드가 제한됩니다.');
}

async function submitGuestbook() {
  const author = document.getElementById('gbAuthor')?.value.trim();
  const content = document.getElementById('gbContent')?.value.trim();
  if(!author || !content) { showToast('내용을 입력해주세요'); return; }
  showToast('메시지가 등록됐어요 💌');
}

function openWriteModal() { document.getElementById('writeModal')?.classList.add('open'); }
function submitWrite() { showToast('기록이 저장됐어요 ✅'); closeModal('writeModal'); }

window.handleCoverChange = handleCoverChange;
window.submitGuestbook = submitGuestbook;
window.openWriteModal = openWriteModal;
window.submitWrite = submitWrite;

</script>
</body>
</html>
