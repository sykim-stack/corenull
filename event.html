<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event</title>
<style>
body{font-family:sans-serif;background:#111;color:#eee}
.card{padding:12px;margin:10px;border-radius:8px;background:#1c1c1c}
h3{margin:0 0 6px}
.row{font-size:14px;opacity:.9}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── STATE ──
const raw = window.EVENT_DATA || { events: [] }


// ── NORMALIZE ──
const normalize = d => ({
  events: Array.isArray(d.events)
    ? d.events.map(e => ({
        title: e.title ?? '-',
        date: e.date ?? '-',
        location: e.location ?? '-',
        status: e.status ?? '예정'
      }))
    : []
})


// ── VIEW MODEL ──
const vmBuild = d => ({
  events: d.events.map(e => ({
    title: e.title,
    fields: [
      ['날짜', e.date],
      ['장소', e.location],
      ['상태', e.status]
    ]
  }))
})


// ── RENDER ──
const render = vm => {
  document.getElementById('app').innerHTML =
    vm.events.map(e => `
      <div class="card">
        <h3>${e.title}</h3>
        ${e.fields.map(([k,v])=>`<div class="row">${k}: ${v}</div>`).join('')}
      </div>
    `).join('')
}


// ── INIT ──
(() => render(vmBuild(normalize(raw))))()
</script>

</body>
</html>
