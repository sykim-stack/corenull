<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하준이 백일 · CoreNull</title>

  <meta property="og:title" content="🎂 하준이 백일잔치">
  <meta property="og:description" content="2026년 3월 31일 · 하준이의 백일을 함께 축하해주세요 🎉">
  <meta property="og:url" content="https://corenull.vercel.app/event?slug=hajun&room=f97d186d-43ce-4623-a4fc-a6b04008a0df">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://corenull.vercel.app/hajun-og.jpg">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream:#FDF8F3; --warm:#F7EEE3; --peach:#F2C4A0;
      --brown:#8B5E3C; --dark:#2C1A0E; --mint:#8FBFAB;
      --pink:#E8A0A8; --gold:#C9A84C; --text:#3D2B1F; --muted:#9B8B7E;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--cream);color:var(--text);font-family:'Gowun Dodum',serif;min-height:100vh;overflow-x:hidden;}

    /* ── 히어로 ── */
    .hero{min-height:100vh;background:linear-gradient(160deg,#FDE8D8 0%,#F7D4C0 40%,#EFBFA8 100%);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:60px 24px;}
    .hero-circles{position:absolute;inset:0;pointer-events:none;}
    .hero-circles span{position:absolute;border-radius:50%;opacity:.15;}
    .hero-circles span:nth-child(1){width:400px;height:400px;background:var(--pink);top:-100px;right:-100px;animation:float1 8s ease-in-out infinite;}
    .hero-circles span:nth-child(2){width:250px;height:250px;background:var(--mint);bottom:-50px;left:-50px;animation:float2 10s ease-in-out infinite;}
    .hero-circles span:nth-child(3){width:150px;height:150px;background:var(--gold);top:30%;left:10%;animation:float1 6s ease-in-out infinite reverse;}
    @keyframes float1{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-20px) scale(1.05);}}
    @keyframes float2{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-15px) rotate(5deg);}}
    .hero-badge{background:rgba(255,255,255,.5);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:30px;padding:8px 20px;font-size:11px;letter-spacing:3px;color:var(--brown);margin-bottom:28px;animation:fadeDown .8s ease both;}
    .photo-frame{width:160px;height:160px;border-radius:50%;background:linear-gradient(135deg,#FDE8D8,#F5C6A8);border:4px solid rgba(255,255,255,.8);box-shadow:0 20px 60px rgba(139,94,60,.25);margin-bottom:28px;overflow:hidden;position:relative;animation:fadeUp .8s .2s ease both;}
    .photo-frame img{width:100%;height:100%;object-fit:cover;}
    .photo-frame-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px;}
    .hero-name{font-family:'Noto Serif KR',serif;font-size:42px;font-weight:700;color:var(--dark);letter-spacing:6px;margin-bottom:8px;animation:fadeUp .8s .3s ease both;text-shadow:0 2px 20px rgba(139,94,60,.15);}
    .hero-sub{font-size:13px;letter-spacing:2px;color:var(--brown);opacity:.8;margin-bottom:32px;animation:fadeUp .8s .4s ease both;}
    .dday-wrap{display:flex;gap:12px;animation:fadeUp .8s .5s ease both;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
    .dday-box{background:rgba(255,255,255,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:16px 20px;text-align:center;min-width:80px;}
    .dday-num{font-family:'Noto Serif KR',serif;font-size:32px;font-weight:700;color:var(--brown);line-height:1;}
    .dday-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-top:4px;}
    .dday-box.highlight .dday-num{color:var(--gold);}
    .share-btn{background:var(--brown);color:white;border:none;border-radius:24px;padding:12px 28px;font-family:'Gowun Dodum',serif;font-size:13px;cursor:pointer;letter-spacing:1px;animation:fadeUp .8s .6s ease both;}
    .share-btn:hover{background:var(--dark);}
    .scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--brown);opacity:.5;font-size:11px;letter-spacing:2px;animation:bounce 2s ease-in-out infinite;}
    @keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}

    /* ── 공통 ── */
    .section{max-width:760px;margin:0 auto;padding:40px 24px;}
    .sec-label{font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
    .sec-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:600;color:var(--dark);margin-bottom:20px;}
    .empty{text-align:center;padding:40px 24px;color:var(--muted);}
    .empty .ei{font-size:36px;margin-bottom:10px;}
    .empty p{font-size:13px;line-height:1.7;}

    /* ── 집주인 업로드 ── */
    .owner-section{max-width:760px;margin:0 auto;padding:24px 24px 0;}
    .owner-bar{background:linear-gradient(135deg,#FEF3DC,#FDE8D8);border:1px dashed var(--peach);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
    .owner-label{font-size:12px;color:var(--brown);letter-spacing:1px;flex:1;}
    .owner-upload-btn{background:var(--brown);color:white;border:none;border-radius:10px;padding:10px 18px;font-family:'Gowun Dodum',serif;font-size:13px;cursor:pointer;white-space:nowrap;}
    .owner-upload-btn:hover{background:var(--dark);}
    .owner-status{font-size:12px;color:var(--muted);width:100%;}
    .upload-progress{width:100%;height:4px;background:rgba(139,94,60,.1);border-radius:4px;overflow:hidden;display:none;margin-top:8px;}
    .upload-progress-bar{height:100%;background:var(--gold);border-radius:4px;transition:width .3s;width:0%;}

    /* ── 대표 사진 ── */
    .hero-photo-full{width:100%;max-height:500px;object-fit:cover;display:block;cursor:pointer;}

    /* ── 스토리 섹션 ── */
    .story-section{max-width:760px;margin:0 auto;padding:32px 24px;}
    .story-list{display:flex;flex-direction:column;gap:36px;}

    /* 날짜 라벨 */
    .story-date-group{}
    .story-date-label{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
    .story-date-label::after{content:'';flex:1;height:1px;background:rgba(139,94,60,.12);}

    /* 스토리 카드 */
    .story-card{background:white;border:1px solid rgba(139,94,60,.1);border-radius:20px;overflow:hidden;cursor:pointer;transition:box-shadow .2s;}
    .story-card:hover{box-shadow:0 8px 32px rgba(139,94,60,.12);}

    /* 사진 그리드 — 페이스북 방식 */
    .story-imgs{overflow:hidden;}
    /* 1장 */
    .story-imgs.one img{width:100%;max-height:420px;object-fit:cover;display:block;}
    /* 2장 */
    .story-imgs.two{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
    .story-imgs.two img{width:100%;aspect-ratio:1;object-fit:cover;}
    /* 3장: 위 1 + 아래 2 */
    .story-imgs.three{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
    .story-imgs.three img:first-child{grid-column:span 2;width:100%;max-height:280px;object-fit:cover;}
    .story-imgs.three img:not(:first-child){aspect-ratio:1;object-fit:cover;width:100%;}
    /* 4장: 위 2 + 아래 2 */
    .story-imgs.four{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
    .story-imgs.four img{aspect-ratio:1;object-fit:cover;width:100%;}
    /* 5장+: 위 2 + 아래 3, 마지막에 +N 오버레이 */
    .story-imgs.many{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
    .story-imgs.many .row-top{grid-column:span 2;display:grid;grid-template-columns:1fr 1fr;gap:2px;}
    .story-imgs.many .row-top img{aspect-ratio:1;object-fit:cover;width:100%;}
    .story-imgs.many .row-bot{grid-column:span 2;display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;}
    .story-imgs.many .row-bot img{aspect-ratio:1;object-fit:cover;width:100%;}
    /* +N 오버레이 */
    .more-cell{position:relative;}
    .more-cell img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
    .more-badge{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:white;font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;cursor:pointer;}

    /* ── 사진 클릭 모달 ── */
    .photo-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:800;align-items:flex-end;justify-content:center;}
    .photo-modal-overlay.open{display:flex;}
    .photo-modal-box{background:var(--cream);border-radius:24px 24px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;position:relative;}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .photo-modal-close{position:absolute;top:14px;right:14px;background:rgba(44,26,14,.15);border:none;color:var(--dark);width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
    .photo-modal-imgs{display:flex;flex-direction:column;gap:2px;}
    .photo-modal-imgs img{width:100%;max-height:400px;object-fit:cover;}
    .photo-modal-imgs img:first-child{border-radius:24px 24px 0 0;}
    .photo-modal-body{padding:20px 20px 40px;}
    .photo-modal-content{font-size:14px;line-height:1.9;color:var(--text);margin-bottom:10px;white-space:pre-wrap;}
    .photo-modal-date{font-size:11px;color:var(--muted);letter-spacing:1px;}

    /* ── 마일스톤 ── */
    .ms-list{display:flex;flex-direction:column;gap:12px;margin-bottom:40px;}
    .ms-item{background:white;border:1px solid rgba(139,94,60,.1);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;}
    .ms-icon{width:44px;height:44px;background:linear-gradient(135deg,#FEF3DC,#FDE8D8);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .ms-info{flex:1;}
    .ms-name{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:2px;}
    .ms-date{font-size:11px;color:var(--muted);}
    .ms-badge{background:var(--gold);color:white;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:600;white-space:nowrap;}
    .ms-badge.done{background:var(--mint);}

    /* ── 방명록 ── */
    .feed-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
    .feed-item{background:white;border:1px solid rgba(139,94,60,.1);border-radius:16px;padding:16px;animation:fadeUp .4s ease both;}
    .feed-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .feed-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--peach));display:flex;align-items:center;justify-content:center;font-size:14px;color:white;font-weight:700;flex-shrink:0;}
    .feed-name{font-size:14px;font-weight:600;color:var(--dark);}
    .feed-flag{font-size:11px;margin-left:auto;background:var(--warm);padding:3px 10px;border-radius:10px;color:var(--muted);}
    .feed-body{font-size:13px;line-height:1.8;color:var(--text);margin-bottom:6px;}
    .feed-img{width:100%;border-radius:10px;overflow:hidden;margin-bottom:8px;}
    .feed-img img{width:100%;object-fit:cover;max-height:220px;}
    .feed-time{font-size:11px;color:var(--muted);}

    /* ── 방명록 폼 ── */
    .gb-form{background:white;border:1px solid rgba(139,94,60,.12);border-radius:20px;padding:20px;}
    .gb-title{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:12px;}
    .gb-input{width:100%;background:var(--warm);border:none;border-radius:12px;padding:12px 14px;font-family:'Gowun Dodum',serif;font-size:13px;color:var(--dark);outline:none;margin-bottom:10px;}
    .gb-textarea{resize:none;height:80px;}
    .gb-actions{display:flex;gap:8px;}
    .gb-photo-btn{background:var(--warm);border:none;border-radius:10px;padding:10px 14px;font-size:18px;cursor:pointer;}
    .gb-submit{flex:1;background:var(--brown);color:white;border:none;border-radius:10px;padding:12px;font-family:'Gowun Dodum',serif;font-size:13px;cursor:pointer;}
    .gb-submit:hover{background:var(--dark);}
    .gb-prev{display:none;margin-top:8px;position:relative;}
    .gb-prev img{width:100%;border-radius:12px;max-height:160px;object-fit:cover;}
    .gb-prev-remove{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:white;border:none;border-radius:50%;width:24px;height:24px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    /* ── 기타 ── */
    .back-btn{display:block;text-align:center;padding:16px;color:var(--muted);font-size:12px;letter-spacing:2px;cursor:pointer;text-decoration:none;}
    .back-btn:hover{color:var(--brown);}
    .footer{background:linear-gradient(160deg,#2C1A0E,#4A2E1A);color:white;text-align:center;padding:40px 24px;}
    .footer-sub{font-size:11px;opacity:.4;letter-spacing:1px;}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--dark);color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ── 라이트박스 ── */
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:900;flex-direction:column;}
    .lightbox.open{display:flex;}
    .lb-wrap{flex:1;overflow:hidden;position:relative;display:flex;align-items:center;}
    .lb-track{display:flex;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1);}
    .lb-slide{min-width:100vw;height:100%;display:flex;align-items:center;justify-content:center;padding:56px 16px 16px;}
    .lb-slide img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;}
    .lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:white;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .lb-btn.prev{left:12px;}.lb-btn.next{right:12px;}
    .lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;color:white;width:38px;height:38px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
    .lb-counter{position:absolute;top:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:12px;background:rgba(0,0,0,.4);padding:4px 14px;border-radius:20px;}
    @media(max-width:480px){.lb-btn{display:none;}}
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-circles"><span></span><span></span><span></span></div>
  <div class="hero-badge" id="heroBadge">🎂 EVENT</div>
  <div class="photo-frame" id="heroFrame">
    <div class="photo-frame-placeholder">🎂</div>
  </div>
  <div class="hero-name" id="heroName">---</div>
  <div class="hero-sub" id="heroSub">불러오는 중...</div>
  <div class="dday-wrap" id="ddayWrap"></div>
  <button class="share-btn" onclick="shareEvent()">🔗 초대장 공유</button>

<!-- 집주인 업로드 -->
<div class="owner-section" id="ownerSection" style="display:none;">
  <div class="owner-bar">

<!-- 갤러리 스토리 -->

<div class="section" id="msSection" style="display:none;">

  <div class="sec-title">⭐ 기념일</div>

<!-- 방명록 -->
<div class="section">
  <div class="sec-label">GUESTBOOK</div>

  <div class="feed-list" id="feedList"></div>

<div class="footer">

<div class="photo-modal-overlay" id="photoModal" onclick="closePhotoModal(event)">

<script>
const params    = new URLSearchParams(location.search);
const SLUG      = params.get('slug') || 'hajun';
const ROOM_ID   = params.get('room');
const OWNER_KEY = params.get('owner') || null;

let HOUSE_ID   = null;
let HOUSE_NAME = '';
let ROOM_NAME  = '';
let EVENT_DATE = '';
let allMedia   = [];
let allEventPosts = [];
let gbPhotoB64 = null;
let IS_OWNER   = false;
let lbImages   = [], lbIndex = 0;

// ── 유틸 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function fmtDateTime(str) {
  if (!str) return '';
  return new Date(str).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
}
function timeAgo(str) {
  const diff = Date.now() - new Date(str).getTime();
  const m = Math.floor(diff/60000), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 0) return `${d}일 전`;
  if (h > 0) return `${h}시간 전`;
  if (m > 0) return `${m}분 전`;
  return '방금';
}
async function b64Blob(b64) { return await (await fetch(b64)).blob(); }
async function resizeImg(file, maxW=1600) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      const s = Math.min(1, maxW/img.width);
      const c = document.createElement('canvas');
      c.width = img.width*s; c.height = img.height*s;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg',.85));
    };
    img.src = url;
  });
}

// ── 데이터 로드 ──
async function loadData() {
  if (!ROOM_ID) {
    document.getElementById('heroName').textContent = '이벤트 없음';
    document.getElementById('heroSub').textContent = 'room 파라미터가 필요합니다';
    return;
  }
  try {
    const ownerParam = OWNER_KEY ? `&owner=${OWNER_KEY}` : '';
    const res  = await fetch(`/api/house?slug=${SLUG}${ownerParam}`);
    const data = await res.json();
    if (!data.house) { showToast('집을 찾을 수 없어요'); return; }

    HOUSE_ID   = data.house.id;
    HOUSE_NAME = data.house.name || SLUG;
    IS_OWNER   = data.is_owner === true;

    const room = (data.rooms||[]).find(r => r.id === ROOM_ID);
    if (!room) { showToast('이벤트를 찾을 수 없어요'); return; }

    ROOM_NAME  = room.room_name;
    EVENT_DATE = room.event_date || '';
    allMedia   = (data.media||[]).filter(m => m.room_id === ROOM_ID && m.media_type === 'photo');

    // 이벤트 분류 posts 수집
    const eventCatId = (data.categories||[]).find(c => c.name === '이벤트')?.id;
    allEventPosts = eventCatId
      ? (data.posts||[]).filter(p =>
          p.room_id === ROOM_ID ||
          (p.category_ids && p.category_ids.includes(eventCatId))
        )
      : (data.posts||[]).filter(p => p.room_id === ROOM_ID);

    document.getElementById('backBtn').href = `/${SLUG}`;

    applyHero(data.house, room);
    renderDday(data.house, room);
    renderGallery();
    renderMilestones(data.milestones||[]);
    renderFeed(data.comments||[], data.house);

    if (IS_OWNER) document.getElementById('ownerSection').style.display = 'block';

  } catch(e) {
    console.error(e);
    showToast('데이터를 불러오지 못했어요');
  }
}

// ── 히어로 ──
function applyHero(house, room) {
  document.title = `${room.room_name} · ${house.name}`;
  document.getElementById('heroBadge').textContent = `🎂 ${house.name}`;
  document.getElementById('heroName').textContent  = room.room_name;
  document.getElementById('heroSub').textContent   = fmtDate(room.event_date);
  if (house.cover_url) {
    document.getElementById('heroFrame').innerHTML = `<img src="${house.cover_url}" alt="${house.name}">`;
  }
}

// ── D-DAY ──
function renderDday(house, room) {
  const boxes = [];
  if (house.birth_date) {
    const elapsed = Math.floor((new Date() - new Date(house.birth_date)) / 86400000);
    boxes.push(`<div class="dday-box"><div class="dday-num">${elapsed}일</div><div class="dday-label">태어난 지</div></div>`);
  }
  if (room.event_date) {
    const diff = Math.ceil((new Date(room.event_date) - new Date()) / 86400000);
    const ddayText = diff > 0 ? `D-${diff}` : diff === 0 ? 'D-DAY 🎉' : '완료 🎂';
    boxes.push(`<div class="dday-box highlight"><div class="dday-num">${ddayText}</div><div class="dday-label">백일까지</div></div>`);
    boxes.push(`<div class="dday-box"><div class="dday-num">100</div><div class="dday-label">${fmtDate(room.event_date)}</div></div>`);
  }
  document.getElementById('ddayWrap').innerHTML = boxes.join('');
}

// ── 사진 배열 렌더 (페이스북 방식) ──
function renderStoryImgs(urls, card) {
  const count = urls.length;
  if (count === 1) return '<div class="story-imgs one"><img src="' + urls[0] + '" loading="lazy"></div>';
  if (count === 2) return '<div class="story-imgs two"><img src="' + urls[0] + '" loading="lazy"><img src="' + urls[1] + '" loading="lazy"></div>';
  if (count === 3) return '<div class="story-imgs three"><img src="' + urls[0] + '" loading="lazy"><img src="' + urls[1] + '" loading="lazy"><img src="' + urls[2] + '" loading="lazy"></div>';
  if (count === 4) return '<div class="story-imgs four">' + urls.map(u => '<img src="' + u + '" loading="lazy">').join('') + '</div>';
  // 5장+
  const show = urls.slice(0, 5);
  const rest = count - 5;
  const topImgs = show.slice(0,2).map(u => '<img src="' + u + '" loading="lazy">').join('');
  const botMid  = show.slice(2,4).map(u => '<img src="' + u + '" loading="lazy">').join('');
  const cardStr = JSON.stringify({urls: card.urls, content: card.content, date: card.date}).replace(/"/g, '&quot;');
  const lastCell = rest > 0
    ? '<div class="more-cell"><img src="' + show[4] + '" loading="lazy"><div class="more-badge" onclick='event.stopPropagation();openPhotoModal(JSON.parse(this.dataset.c))' data-c="' + cardStr + '">+' + (rest + 1) + '</div></div>'
    : '<img src="' + show[4] + '" loading="lazy">';
  return '<div class="story-imgs many"><div class="row-top">' + topImgs + '</div><div class="row-bot">' + botMid + lastCell + '</div></div>';
}

// ── 갤러리 (날짜 그룹핑 + 스토리 카드) ──
function renderGallery() {
  const sec = document.getElementById('gallerySection');

  // media + posts 합치기
  const mediaItems = allMedia.map(m => ({
    urls: [m.file_url], content: m.content||'', date: m.created_at
  }));
  const postItems = allEventPosts
    .filter(p => p.media_urls && p.media_urls.length)
    .map(p => ({
      urls: p.media_urls, content: p.content||'', date: p.created_at
    }));

  // 날짜+내용 기준 그룹핑 (같은 글의 여러 사진 = 하나의 카드)
  const groupMap = {};
  [...mediaItems, ...postItems].forEach(item => {
    const d = new Date(item.date);
    const dateKey = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    const groupKey = `${dateKey}__${item.content}`;
    if (!groupMap[groupKey]) {
      groupMap[groupKey] = {
        dateLabel: `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`,
        dateKey,
        urls: [],
        content: item.content,
        date: item.date
      };
    }
    groupMap[groupKey].urls.push(...item.urls);
  });

  // 중복 URL 제거
  Object.values(groupMap).forEach(g => {
    g.urls = [...new Set(g.urls)];
  });

  const allCards = Object.values(groupMap)
    .sort((a,b) => new Date(a.date) - new Date(b.date));

  if (!allCards.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';

  // 날짜별로 재그룹
  const dayGroups = {};
  allCards.forEach(card => {
    if (!dayGroups[card.dateLabel]) dayGroups[card.dateLabel] = [];
    dayGroups[card.dateLabel].push(card);
  });

  // 대표 사진 (전체 첫 번째)
  const firstUrl = allCards[0].urls[0];

  const storyHtml = Object.entries(dayGroups).map(([dateLabel, cards]) => `
    <div class="story-date-group">
      <div class="story-date-label">${dateLabel}</div>
      ${cards.map(card => {
        const cardData = JSON.stringify({
          urls: card.urls,
          content: card.content,
          date: card.date
        }).replace(/'/g, '&#39;');
        return `
          <div class="story-card" onclick='openPhotoModal(${cardData})'>
            ${renderStoryImgs(card.urls, card)}
          </div>`;
      }).join('')}
    </div>
  `).join('');

  sec.innerHTML = `
    <img class="hero-photo-full" src="${firstUrl}" loading="lazy"
      onclick='openLightbox(${JSON.stringify([firstUrl])},0)'>
    <div class="story-section">
      <div class="sec-label" style="margin-bottom:6px;">STORY</div>
      <div class="sec-title" style="margin-bottom:24px;">📷 사진 기록</div>
      <div class="story-list">${storyHtml}</div>
    </div>
  `;
}

// ── 사진 클릭 모달 ──
function openPhotoModal(item) {
  if (typeof item === 'string') item = JSON.parse(item);
  const first = item.urls[0];
  const rest  = item.urls.slice(1);
  const allUrlsStr = JSON.stringify(item.urls).replace(/"/g,"'");
  const restHtml = rest.length
    ? '<div style="display:grid;grid-template-columns:repeat(' + Math.min(rest.length,3) + ',1fr);gap:2px;">'
      + rest.map((url,i) =>
          '<img src="' + url + '" loading="lazy" onclick="event.stopPropagation();openLightbox(' + allUrlsStr + ',' + (i+1) + ')" style="width:100%;aspect-ratio:1;object-fit:cover;cursor:zoom-in;">'
        ).join('')
      + '</div>'
    : '';
  document.getElementById('photoModalImgs').innerHTML =
    '<img src="' + first + '" loading="lazy" onclick="event.stopPropagation();openLightbox(' + allUrlsStr + ',0)" style="width:100%;max-height:380px;object-fit:cover;border-radius:24px 24px 0 0;cursor:zoom-in;display:block;">'
    + restHtml;
  document.getElementById('photoModalContent').textContent = item.content || '';
  document.getElementById('photoModalDate').textContent = item.date ? fmtDateTime(item.date) : '';
  document.getElementById('photoModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePhotoModal(e) {
  if (e && e.target !== document.getElementById('photoModal') &&
      !e.target.classList.contains('photo-modal-close')) return;
  document.getElementById('photoModal').classList.remove('open');
  document.body.style.overflow = '';
}

// ── 마일스톤 ──
function renderMilestones(milestones) {
  const sec  = document.getElementById('msSection');
  const list = document.getElementById('msList');
  if (!milestones.length) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  const now = new Date();
  list.innerHTML = milestones.map(m => {
    if (!m.milestone_date) return '';
    const diff = Math.ceil((new Date(m.milestone_date) - now) / 86400000);
    const isDone = diff < 0;
    const badge = isDone ? '완료 ✓' : diff === 0 ? 'D-DAY' : `D-${diff}`;
    return `<div class="ms-item">
      <div class="ms-icon">${m.memo||'⭐'}</div>
      <div class="ms-info">
        <div class="ms-name">${m.title}</div>
        <div class="ms-date">${fmtDate(m.milestone_date)}</div>
      </div>
      <div class="ms-badge ${isDone?'done':''}">${badge}</div>
    </div>`;
  }).join('');
}

// ── 방명록 ──
function renderFeed(comments, house) {
  const list = document.getElementById('feedList');
  document.getElementById('gbTitle').textContent = `${house.name}에게 축하 메시지를 남겨주세요 🎉`;
  if (!comments.length) {
    list.innerHTML = `<div class="empty"><div class="ei">💌</div><p>아직 메시지가 없어요<br>첫 번째 축하 메시지를 남겨주세요!</p></div>`;
    return;
  }
  list.innerHTML = comments.map((c,i) => `
    <div class="feed-item" style="animation-delay:${i*.06}s">
      <div class="feed-head">
        <div class="feed-av">${(c.author_name||'?')[0]}</div>
        <div class="feed-name">${c.author_name||'익명'}</div>
        <div class="feed-flag">${c.lang==='vi'?'🇻🇳':'🇰🇷'}</div>
      </div>
      ${c.media_url?`<div class="feed-img"><img src="${c.media_url}" loading="lazy"></div>`:''}
      <div class="feed-body">${(c.content_original||c.content||'').replace(/\n/g,'<br>')}</div>
      <div class="feed-time">${timeAgo(c.created_at)}</div>
    </div>
  `).join('');
}

// ── 집주인 사진 업로드 ──
async function uploadOwnerPhotos(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const status   = document.getElementById('ownerStatus');
  const progWrap = document.getElementById('uploadProgress');
  const progBar  = document.getElementById('uploadProgressBar');
  progWrap.style.display = 'block';
  progBar.style.width    = '0%';
  status.textContent     = `0 / ${files.length} 업로드 중...`;
  let done = 0;
  for (const file of files) {
    try {
      const b64  = await resizeImg(file,1600);
      const blob = await b64Blob(b64);
      const fd   = new FormData();
      fd.append('file',blob,'event.jpg');
      fd.append('upload_preset','corenull');
      const cr = await fetch('https://api.cloudinary.com/v1_1/dqzazs9hb/image/upload',{method:'POST',body:fd});
      const cl = await cr.json();
      if (!cl.secure_url) throw new Error('Cloudinary 실패');
      await fetch('/api/upload',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({house_id:HOUSE_ID,room_id:ROOM_ID,file_url:cl.secure_url,media_type:'photo',content_type:'manual'})
      });
      done++;
      progBar.style.width = `${Math.round((done/files.length)*100)}%`;
      status.textContent  = `${done} / ${files.length} 완료`;
    } catch(e) {
      console.error(e);
      showToast(`사진 업로드 실패 (${done+1}번째)`);
    }
  }
  status.textContent = `✅ ${done}장 추가됐어요`;
  showToast(`${done}장 추가됐어요 📷`);
  setTimeout(async() => { await loadData(); progWrap.style.display='none'; }, 800);
  input.value = '';
}

// ── 방명록 폼 ──
function previewGbPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    gbPhotoB64 = e.target.result;
    document.getElementById('gbPrevImg').src = e.target.result;
    document.getElementById('gbPrev').style.display = 'block';
  };
  r.readAsDataURL(file);
}
function removeGbPhoto() {
  gbPhotoB64 = null;
  document.getElementById('gbPrev').style.display = 'none';
  document.getElementById('gbPhotoInput').value = '';
}
async function submitGuestbook() {
  const author  = document.getElementById('gbAuthor').value.trim();
  const content = document.getElementById('gbContent').value.trim();
  if (!author||!content) { showToast('이름과 메시지를 입력해주세요'); return; }
  let media_url = null;
  if (gbPhotoB64) {
    try {
      showToast('사진 업로드 중... ⏳');
      const blob = await b64Blob(gbPhotoB64);
      const fd = new FormData(); fd.append('file',blob,'gb.jpg'); fd.append('upload_preset','corenull');
      const cr = await fetch('https://api.cloudinary.com/v1_1/dqzazs9hb/image/upload',{method:'POST',body:fd});
      const cl = await cr.json();
      if (cl.secure_url) media_url = cl.secure_url;
    } catch(e) { showToast('사진 업로드 실패'); return; }
  }
  try {
    const res  = await fetch('/api/comment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({house_id:HOUSE_ID,author_name:author,content,media_url})});
    const data = await res.json();
    if (res.ok && data.success) {
      document.getElementById('gbAuthor').value = '';
      document.getElementById('gbContent').value = '';
      removeGbPhoto();
      showToast('메시지가 등록됐어요 💌');
      await loadData();
    } else showToast(data.error||'등록 실패');
  } catch(e) { showToast('오류가 발생했어요'); }
}

// ── 공유 ──
function shareEvent() {
  const url = location.href.split('&owner=')[0];
  const now = new Date();
  const diff = EVENT_DATE ? Math.ceil((new Date(EVENT_DATE)-now)/86400000) : null;
  const ddayStr = diff===null?'':diff>0?`D-${diff}`:diff===0?'D-DAY 🎉':'완료 🎂';
  const text = `${ROOM_NAME} 초대장 🎂\n${HOUSE_NAME}의 백일이 ${ddayStr}이에요!\n\n축하 메시지를 남겨주세요 💌\n👉 ${url}`;
  if (navigator.share && /android|iphone|ipad/i.test(navigator.userAgent)) {
    navigator.share({title:`${ROOM_NAME} 초대장`,text,url}).catch(()=>copyLink(text));
  } else copyLink(text);
}
function copyLink(text) {
  navigator.clipboard.writeText(text)
    .then(()=>showToast('초대장이 복사됐어요 📋 카카오톡에 붙여넣기 하세요'))
    .catch(()=>showToast('복사 실패'));
}

// ── 라이트박스 ──
let lbTX=0, lbDX=0, lbDrag=false;
function openLightbox(images,idx) {
  lbImages=images; lbIndex=idx;
  document.getElementById('lbTrack').innerHTML = images.map(url=>`<div class="lb-slide"><img src="${url}" draggable="false"></div>`).join('');
  updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function updateLb() {
  document.getElementById('lbTrack').style.transform=`translateX(-${lbIndex*100}vw)`;
  document.getElementById('lbCounter').textContent=`${lbIndex+1} / ${lbImages.length}`;
}
function lbPrev(){if(lbIndex>0){lbIndex--;updateLb();}}
function lbNext(){if(lbIndex<lbImages.length-1){lbIndex++;updateLb();}}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
const lbEl=document.getElementById('lightbox');
lbEl.addEventListener('touchstart',e=>{lbTX=e.touches[0].clientX;lbDrag=true;lbDX=0;},{passive:true});
lbEl.addEventListener('touchmove',e=>{if(!lbDrag)return;lbDX=e.touches[0].clientX-lbTX;},{passive:true});
lbEl.addEventListener('touchend',()=>{if(lbDX<-50)lbNext();else if(lbDX>50)lbPrev();lbDrag=false;});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowLeft')lbPrev();
  if(e.key==='ArrowRight')lbNext();
  if(e.key==='Escape')closeLightbox();
});

loadData();
</script>
