<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>House</title>
<style>
body{font-family:sans-serif;background:#111;color:#eee}
.card{padding:12px;margin:10px;border-radius:8px;background:#1c1c1c}
h3{margin:0 0 6px}
.row{font-size:14px;opacity:.9}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── STATE ──
const raw = window.HOUSE_DATA || { rooms: [] }

// ── NORMALIZE ──
const normalize = d => ({
  rooms: Array.isArray(d.rooms)
    ? d.rooms.map(r => ({
        name: r.name ?? '-',
        price: Number(r.price) || 0,
        status: r.status ?? '정보없음'
      }))
    : []
})

// ── VIEW MODEL ──
const vmBuild = d => ({
  rooms: d.rooms.map(r => ({
    name: r.name,
    fields: [
      ['가격', r.price],
      ['상태', r.status]
    ]
  }))
})

// ── RENDER ──
const render = vm => {
  document.getElementById('app').innerHTML =
    vm.rooms.map(r => `
      <div class="card">
        <h3>${r.name}</h3>
        ${r.fields.map(([k,v])=>`<div class="row">${k}: ${v}</div>`).join('')}
      </div>
    `).join('')
}

// ── INIT ──
(() => render(vmBuild(normalize(raw))))()
</script>

</body>
</html>
