<!-- ════ MODULE SCRIPT ════ -->
<script type="module">

/* ══════════════════════════════════════════
   0. 전역 상태 (단일 네임스페이스)
══════════════════════════════════════════ */
const CN = {
  slug:       location.pathname.replace(/^\//, '') || 'hajun',
  ownerKey:   new URLSearchParams(location.search).get('owner'),
  isOwner:    false,
  houseId:    null,
  house:      null,
  rooms:      [],
  categories: [],
  posts:      [],   // guestbook comments: []로 분리
  comments:   [],   // guestbook 전용 (Phase 0)
  media:      [],
  milestones: [],
  // 업로드 임시 상태
  composeFiles: [],
  uploadFiles:  [],
  lbImages:     [],
  lbIndex:      0,
  gbPhotoB64:   null,
  uploadRoomId: null,
  activeCat:    null,
  // 수정 모드
  editPostId:   null,
};

/* ══════════════════════════════════════════
   1. Device ID
══════════════════════════════════════════ */
function getDeviceId() {
  let id = localStorage.getItem('cn_device_id');
  if (!id) {
    id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('cn_device_id', id);
  }
  return id;
}
const DEVICE_ID = getDeviceId();

/* ══════════════════════════════════════════
   2. 유틸
══════════════════════════════════════════ */
const ROOM_META = {
  living:  { icon: '🛋️', label: '거실' },
  room:    { icon: '🚪', label: '방' },
  library: { icon: '📚', label: '서재' },
};

const CAT_META = {
  baby:    { emoji: '👶', ph: '👶' },
  pet:     { emoji: '🐾', ph: '🐾' },
  travel:  { emoji: '✈️', ph: '✈️' },
  fitness: { emoji: '💪', ph: '💪' },
  daily:   { emoji: '🏠', ph: '🏠' },
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function openConfirm(title, sub, onOk) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmSub').textContent   = sub;
  document.getElementById('confirmOk').onclick = () => { closeConfirm(); onOk(); };
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}

function openModal(id)  { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }

function esc(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;
}

function timeAgo(str) {
  const diff = Date.now() - new Date(str).getTime();
  const m = Math.floor(diff / 60000), h = Math.floor(m / 60), d = Math.floor(h / 24);
  if (d > 0) return `${d}일 전`;
  if (h > 0) return `${h}시간 전`;
  if (m > 0) return `${m}분 전`;
  return '방금';
}

async function resizeImg(file, maxW = 1200) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      const s = Math.min(1, maxW / img.width);
      const c = document.createElement('canvas');
      c.width = img.width * s; c.height = img.height * s;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = url;
  });
}

async function b64Blob(b64) { return await (await fetch(b64)).blob(); }

async function cloudinaryUpload(blob, name = 'img.jpg') {
  const fd = new FormData();
  fd.append('file', blob, name);
  fd.append('upload_preset', 'corenull');
  const r    = await fetch('https://api.cloudinary.com/v1_1/dqzazs9hb/image/upload', { method: 'POST', body: fd });
  const data = await r.json();
  if (!data.secure_url) throw new Error('Cloudinary 업로드 실패');
  return data.secure_url;
}

function parseVideoUrl(url) {
  if (!url) return null;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  if (yt) return { platform: 'YouTube', embedUrl: `https://www.youtube.com/embed/${yt[1]}` };
  const tt = url.match(/tiktok\.com\/@[^/]+\/video\/(\d+)/);
  if (tt) return { platform: 'TikTok', embedUrl: `https://www.tiktok.com/embed/${tt[1]}` };
  const fb = url.match(/facebook\.com/);
  if (fb) return { platform: 'Facebook', embedUrl: `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}` };
  return null;
}

/* ══════════════════════════════════════════
   3. 데이터 로드
══════════════════════════════════════════ */
async function fetchData() {
  const ownerQ = CN.ownerKey ? `&owner=${encodeURIComponent(CN.ownerKey)}` : '';
  const res    = await fetch(`/api/house?slug=${CN.slug}${ownerQ}`);
  const data   = await res.json();
  if (!data.house) throw new Error(data.error || '집을 찾을 수 없어요');

  CN.house      = data.house;
  CN.houseId    = data.house.id;
  CN.isOwner    = !!data.house.is_owner;
  CN.rooms      = data.rooms      || [];
  CN.categories = data.categories || [];
  CN.posts      = data.posts      || [];
  CN.comments   = data.comments   || [];  // guestbook 전용
  CN.media      = data.media      || [];
  CN.milestones = data.milestones || [];

  return data;
}

async function reloadData() {
  await fetchData();
  rebuildRenderTargets();
}

/* ══════════════════════════════════════════
   4. 셸 렌더 (커버/프로필/이름/공유)
══════════════════════════════════════════ */
function renderShell() {
  const h   = CN.house;
  const cat = CAT_META[h.category] || CAT_META.daily;

  document.title = `${h.name || CN.slug} · CoreNull`;
  document.getElementById('heroName').textContent    = h.name || CN.slug;
  document.getElementById('heroSub').textContent     = h.description || '';
  document.getElementById('footerName').textContent  = h.name || CN.slug;
  document.getElementById('footerEi').textContent    = cat.emoji;

  // 커버
  const coverImg = document.getElementById('coverImg');
  if (h.cover_url) coverImg.style.backgroundImage = `url(${h.cover_url})`;

  // 커버 수정 버튼 (오너)
  const coverWrap = document.getElementById('coverWrap');
  coverWrap.querySelector('.cover-edit-btn')?.remove();
  if (CN.isOwner) {
    const btn = document.createElement('button');
    btn.className   = 'cover-edit-btn';
    btn.textContent = '📷 커버 수정';
    btn.addEventListener('click', () => document.getElementById('coverInput').click());
    coverWrap.appendChild(btn);
  }

  // 프로필 사진
  const photo = document.getElementById('profilePhoto');
  if (h.profile_url) {
    photo.innerHTML = `<img src="${h.profile_url}" alt="${esc(h.name)}"><div class="profile-photo-hint">변경</div>`;
  } else {
    document.getElementById('profilePlaceholder').textContent = cat.ph;
  }
  if (CN.isOwner) {
    photo.classList.add('is-owner');
    photo.onclick = () => document.getElementById('profileInput').click();
  }

  // D-Day
  renderDday(h);

  // 공유 버튼
  const shareWrap = document.getElementById('shareWrap');
  shareWrap.style.display = 'flex';
  shareWrap.innerHTML = `
    <button class="share-btn kakao" id="shareKakaoBtn">💬 카카오</button>
    <button class="share-btn link"  id="shareLinkBtn">🔗 링크 복사</button>`;
  document.getElementById('shareKakaoBtn').addEventListener('click', shareKakao);
  document.getElementById('shareLinkBtn').addEventListener('click', copyLink);
}

function renderDday(h) {
  if (!h.birth_date && !h.start_date) return;
  const start   = new Date(h.birth_date || h.start_date);
  const now     = new Date();
  const elapsed = Math.floor((now - start) / 86400000);
  let items = [{ num: elapsed + '일', label: '지난 날' }];
  if (h.category === 'baby' && h.hundred_date) {
    const diff = Math.ceil((new Date(h.hundred_date) - now) / 86400000);
    items = [
      { num: elapsed + '일', label: '태어난 지' },
      { num: diff > 0 ? `D-${diff}` : diff === 0 ? 'D-DAY' : '완료 🎂', label: '백일까지' },
      { num: '100', label: '기념일' },
    ];
  }
  document.getElementById('ddayWrap').innerHTML = items.map(i =>
    `<div class="dday-box">
      <div class="dday-num">${i.num}</div>
      <div class="dday-label">${i.label}</div>
    </div>`).join('');
}

/* ══════════════════════════════════════════
   5. 탭 빌드
══════════════════════════════════════════ */
const _renderMap = new Map(); // tabId → renderFn

function buildTabs() {
  const topTabs     = document.getElementById('topTabs');
  const tabContents = document.getElementById('tabContents');
  topTabs.innerHTML    = '';
  tabContents.innerHTML = '';

  const ORDER   = ['living', 'room', 'library'];
  const ordered = ORDER.map(t => CN.rooms.find(r => r.room_type === t)).filter(Boolean);

  ordered.forEach((room, idx) => {
    const meta  = ROOM_META[room.room_type];
    const tabId = `tab-${room.id}`;

    const btn = document.createElement('button');
    btn.className   = 'top-tab-btn' + (idx === 0 ? ' active' : '');
    btn.innerHTML   = `<span class="ti">${meta.icon}</span>${meta.label}`;
    btn.dataset.tab = tabId;
    btn.addEventListener('click', () => switchTab(tabId));
    topTabs.appendChild(btn);

    const div = document.createElement('div');
    div.className = 'tab-content' + (idx === 0 ? ' active' : '');
    div.id = tabId;
    tabContents.appendChild(div);

    // 렌더 함수 등록
    if (room.room_type === 'living')  { _renderMap.set(tabId, () => renderLiving(div)); renderLiving(div); }
    if (room.room_type === 'room')    { _renderMap.set(tabId, () => renderRoom(div, room)); renderRoom(div, room); }
    if (room.room_type === 'library') { _renderMap.set(tabId, () => renderLibrary(div)); renderLibrary(div); }
  });
}

function rebuildRenderTargets() {
  _renderMap.forEach(fn => fn());
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.top-tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tabId)?.classList.add('active');
  document.querySelector(`[data-tab="${tabId}"]`)?.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchToType(type) {
  const r = CN.rooms.find(r => r.room_type === type);
  if (r) switchTab(`tab-${r.id}`);
}

/* ══════════════════════════════════════════
   6. 거실 렌더
══════════════════════════════════════════ */
function renderLiving(container) {
  const h = CN.house;
  if (!h) return;

  // 백일 배너
  let bannerHtml = '';
  if (h.hundred_date) {
    const diff = Math.ceil((new Date(h.hundred_date) - new Date()) / 86400000);
    if (diff >= 0) {
      const badge = diff === 0 ? 'D-DAY 🎉' : `D-${diff}`;
      bannerHtml = `<div class="lobby-banner"><div class="lobby-banner-inner">
        <div class="lobby-badge">${badge}</div>
        <div>
          <div style="font-size:14px;font-weight:600;">${h.name}의 백일이 다가오고 있어요 🎂</div>
          <div style="font-size:12px;color:var(--muted)">${fmtDate(h.hundred_date)} · ${diff}일 남았어요</div>
        </div>
      </div></div>`;
    }
  }

  // 방 카드
  const navRooms = CN.rooms.filter(r => r.room_type !== 'living');
  const roomCardsHtml = navRooms.length ? `
    <div class="sec-head" style="margin-bottom:14px;">
      <div><div class="sec-label">ROOMS</div><div class="sec-title">방 둘러보기</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:36px;">
      ${navRooms.map(r => {
        const icon = r.room_type === 'library' ? '📚' : '🚪';
        const cnt  = r.room_type === 'library'
          ? `사진 ${CN.media.filter(m => m.media_type === 'photo').length}장`
          : `글 ${CN.posts.filter(p => p.room_id === r.id).length}개`;
        return `<div data-nav-room="${r.id}"
          style="background:white;border:1px solid rgba(139,94,60,.12);border-radius:14px;padding:14px 12px;cursor:pointer;transition:all .2s;"
          onmouseover="this.style.borderColor='var(--brown)';this.style.background='var(--warm)'"
          onmouseout="this.style.borderColor='rgba(139,94,60,.12)';this.style.background='white'">
          <div style="font-size:24px;margin-bottom:7px;">${icon}</div>
          <div style="font-size:12px;font-weight:600;color:var(--dark);">${r.room_name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">${cnt}</div>
        </div>`;
      }).join('')}
    </div>` : '';

  // 최근 사진
  const photos = CN.media.filter(m => m.media_type === 'photo').slice(0, 3);
  const lbUrls = photos.map(m => m.file_url);
  const photoHtml = photos.length
    ? photos.map((m, i) => `<div class="ps-cell" data-lb-urls='${JSON.stringify(lbUrls)}' data-lb-idx="${i}"><img src="${m.file_url}" loading="lazy"></div>`).join('')
    : `<div style="grid-column:span 3;text-align:center;padding:24px;color:var(--muted);font-size:13px;">아직 사진이 없어요 📷</div>`;

  // 다음 마일스톤
  const now   = new Date();
  const nextM = CN.milestones
    .filter(m => m.milestone_date && new Date(m.milestone_date) >= now)
    .sort((a, b) => new Date(a.milestone_date) - new Date(b.milestone_date))[0];
  let msHtml = '';
  if (nextM) {
    const diff = Math.ceil((new Date(nextM.milestone_date) - now) / 86400000);
    msHtml = `<div class="sec-label" style="margin-bottom:10px;">NEXT MILESTONE</div>
      <div class="ms-card">
        <div class="ms-icon">${nextM.memo || '⭐'}</div>
        <div class="ms-info">
          <div class="ms-name">${nextM.title}</div>
          <div class="ms-date">${fmtDate(nextM.milestone_date)}</div>
        </div>
        <div class="ms-badge">${diff === 0 ? 'D-DAY' : `D-${diff}`}</div>
      </div>`;
  }

  // 최근 포스트
  const recentPosts = [...CN.posts].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 2);
  const recentPostsHtml = recentPosts.length ? `
    <div class="sec-head" style="margin-bottom:14px;margin-top:36px;">

function _livingClickHandler(e) {
  // 방 카드 클릭
  const navRoom = e.target.closest('[data-nav-room]');
  if (navRoom) { switchTab(`tab-${navRoom.dataset.navRoom}`); return; }

  // 더보기
  const switchBtn = e.target.closest('[data-switch-type]');
  if (switchBtn) { switchToType(switchBtn.dataset.switchType); return; }

  // 사진 클릭 (라이트박스)
  const psCell = e.target.closest('[data-lb-urls]');
  if (psCell) { openLightbox(JSON.parse(psCell.dataset.lbUrls), Number(psCell.dataset.lbIdx)); return; }

  // 방명록 삭제
  const delBtn = e.target.closest('[data-comment-id]');
  if (delBtn && CN.isOwner) { _deleteComment(delBtn.dataset.commentId); return; }

  // 번역
  const transBtn = e.target.closest('.gb-translate-btn');
  if (transBtn) { _translateComment(transBtn.dataset.txt, transBtn); return; }
}

let _gbPhotoB64 = null;

function _bindGuestbookForm(container) {
  container.querySelector('#gbPhotoBtn')?.addEventListener('click', () => {
    container.querySelector('#gbPhotoInput')?.click();
  });
  container.querySelector('#gbPhotoInput')?.addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      _gbPhotoB64 = ev.target.result;
      document.getElementById('gbPrevImg').src = ev.target.result;
      document.getElementById('gbPrevWrap').style.display = 'block';
    };
    r.readAsDataURL(file);
  });
  container.querySelector('#gbSubmitBtn')?.addEventListener('click', _submitGuestbook);
  container.querySelector('#aiKoBtn')?.addEventListener('click', () => _getAiMsg('ko'));
  container.querySelector('#aiViBtn')?.addEventListener('click', () => _getAiMsg('vi'));
}

async function _submitGuestbook() {
  const author  = document.getElementById('gbAuthor')?.value.trim();
  const content = document.getElementById('gbContent')?.value.trim();
  if (!author || !content) { showToast('이름과 메시지를 입력해주세요'); return; }
  localStorage.setItem('cn_author_name', author);

  let media_url = null;
  if (_gbPhotoB64) {
    try {
      showToast('사진 업로드 중... ⏳');
      const blob = await b64Blob(_gbPhotoB64);
      media_url  = await cloudinaryUpload(blob, 'gb.jpg');
    } catch { showToast('사진 업로드 실패'); return; }
  }

  const res  = await fetch('/api/comment', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ house_id: CN.houseId, author_name: author, content, media_url }),
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('gbAuthor').value  = '';
    document.getElementById('gbContent').value = '';
    document.getElementById('gbPrevWrap').style.display = 'none';
    _gbPhotoB64 = null;
    showToast('메시지가 등록됐어요 💌');
    await reloadData();
  } else showToast(data.error || '등록 실패');
}

async function _deleteComment(id) {
  openConfirm('메시지를 삭제할까요?', '삭제하면 되돌릴 수 없어요.', async () => {
    await fetch('/api/comment', {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comment_id: id, house_id: CN.houseId }),
    });
    showToast('삭제됐어요');
    await reloadData();
  });
}

async function _getAiMsg(lang) {
  const btnId = lang === 'vi' ? 'aiViBtn' : 'aiKoBtn';
  const btn   = document.getElementById(btnId); if (!btn) return;
  btn.disabled = true;
  try {
    const res  = await fetch('/api/gemini', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'message', context: { lang } }),
    });
    const data = await res.json();
    const el   = document.getElementById('aiSugg'); if (!el) return;
    el.innerHTML = (data.suggestions || []).map(s =>
      `<button class="ai-chip" data-sugg="${esc(s)}">${esc(s)}</button>`
    ).join('');
    el.style.display = 'flex';
    el.addEventListener('click', e => {
      const chip = e.target.closest('[data-sugg]');
      if (!chip) return;
      const ta = document.getElementById('gbContent');
      if (ta) ta.value = chip.dataset.sugg;
      el.style.display = 'none';
    });
  } catch { showToast('AI 문구 생성 실패'); }
  finally { btn.disabled = false; }
}

async function _translateComment(txt, btn) {
  btn.disabled  = true;
  btn.textContent = '번역 중...';
  try {
    const res  = await fetch('/api/gemini', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'translate', text: txt }),
    });
    const data = await res.json();
    const item = btn.closest('.feed-item');
    const body = item?.querySelector('.feed-body');
    if (body && data.translated) {
      body.insertAdjacentHTML('beforeend',
        `<div style="margin-top:8px;padding:6px 10px;background:var(--warm);border-radius:8px;font-size:12px;color:var(--muted);">🌐 ${esc(data.translated)}</div>`);
    }
    btn.style.display = 'none';
  } catch { btn.disabled = false; btn.textContent = '🌐 번역'; }
}

function renderRoom(container, room) {
  const normal = CN.categories.filter(c => !c.is_event);
  const events = CN.categories.filter(c =>  c.is_event);

  const catChips = [
    `<button class="cat-chip active" data-cat="all">전체</button>`,
    ...normal.map(c => `<button class="cat-chip" data-cat="${c.id}"
      style="--cat-color:${c.color || 'var(--mint)'};">${esc(c.name)}</button>`),
    ...(events.length
      ? [`<span style="color:var(--muted);font-size:11px;align-self:center;">|</span>`,
         ...events.map(c => {
           const diff = c.event_date ? Math.ceil((new Date(c.event_date) - new Date()) / 86400000) : null;
           const badge = diff === null ? '' : diff > 0 ? `<span class="cat-chip-dday">D-${diff}</span>`
             : diff === 0 ? `<span class="cat-chip-dday today">D-DAY</span>`
             : `<span class="cat-chip-dday past">D+${Math.abs(diff)}</span>`;
           return `<button class="cat-chip cat-chip-event" data-cat="${c.id}">🎂 ${esc(c.name)}${badge}</button>`;
         })]
      : []),
  ].join('');

  container.innerHTML = `
    <div class="section">
      <div class="sec-head" style="margin-bottom:16px;">
        <div><div class="sec-label">ROOM</div><div class="sec-title">${esc(room.room_name)}</div></div>
        <div style="display:flex;gap:8px;">
          ${CN.isOwner ? `<button class="more-btn" id="roomWriteBtn">+ 글쓰기</button>` : ''}
        </div>
      </div>
      <div class="cat-filter" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;" id="roomCatBar">
        ${catChips}
      </div>
      <div id="roomPostList-${room.id}"></div>
    </div>`;

  _renderRoomPosts(room.id);

  // 이벤트 위임
  container.querySelector('#roomCatBar')?.addEventListener('click', e => {
    const chip = e.target.closest('[data-cat]');
    if (!chip) return;
    container.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    CN.activeCat = chip.dataset.cat === 'all' ? null : chip.dataset.cat;
    _renderRoomPosts(room.id);
  });

  container.querySelector('#roomWriteBtn')?.addEventListener('click', () => {
    CN.editPostId = null;
    openComposeModal(room.id);
  });

  container.addEventListener('click', e => {
    const delBtn = e.target.closest('[data-del-post]');
    if (delBtn && CN.isOwner) { _deletePost(delBtn.dataset.delPost, room.id); }
    const imgEl = e.target.closest('[data-lb-urls]');
    if (imgEl) { openLightbox(JSON.parse(imgEl.dataset.lbUrls), Number(imgEl.dataset.lbIdx)); }
  });
}

function _getFilteredPosts(roomId) {
  const posts = CN.posts.filter(p => p.room_id === roomId);
  if (!CN.activeCat) return posts;
  return posts.filter(p => (p.category_ids || []).map(String).includes(String(CN.activeCat)));
}

function _renderRoomPosts(roomId) {
  const el = document.getElementById(`roomPostList-${roomId}`);
  if (!el) return;
  const posts = _getFilteredPosts(roomId);
  if (!posts.length) {
    el.innerHTML = `<div class="empty"><div class="ei">📝</div>
      <p>아직 글이 없어요${CN.isOwner ? '<br>첫 번째 글을 써보세요!' : ''}</p></div>`;
    return;
  }
  el.innerHTML = posts.map((p, i) => _postCardHtml(p, i)).join('');
}

function _storyImgsHtml(urls) {
  if (!urls.length) return '';
  const cnt  = urls.length;
  const attr = (u, i) => `data-lb-urls='${JSON.stringify(urls)}' data-lb-idx="${i}"`;
  const img  = (u, i) => `<img src="${esc(u)}" loading="lazy" ${attr(u, i)} style="cursor:zoom-in;">`;
  if (cnt === 1) return `<div class="story-imgs one">${img(urls[0], 0)}</div>`;
  if (cnt === 2) return `<div class="story-imgs two">${img(urls[0], 0)}${img(urls[1], 1)}</div>`;
  if (cnt === 3) return `<div class="story-imgs three">${urls.map((u, i) => img(u, i)).join('')}</div>`;
  if (cnt === 4) return `<div class="story-imgs four">${urls.map((u, i) => img(u, i)).join('')}</div>`;
  const show = urls.slice(0, 5), rest = cnt - 5;
  const top  = show.slice(0, 2).map((u, i) => img(u, i)).join('');
  const mid  = show.slice(2, 4).map((u, i) => img(u, i + 2)).join('');
  const last = rest > 0
    ? `<div class="more-cell" ${attr(null, 4)}>${img(show[4], 4)}<div class="more-badge">+${rest + 1}</div></div>`
    : img(show[4], 4);
  return `<div class="story-imgs many"><div class="row-top">${top}</div><div class="row-bot">${mid}${last}</div></div>`;
}

function _postCardHtml(p, delay = 0) {
  const tags = (p.category_ids || []).map(cid => {
    const c = CN.categories.find(x => x.id === cid);
    return c ? `<span class="post-tag" style="background:${c.color || 'var(--mint)'};">${esc(c.name)}</span>` : '';
  }).join('');
  const imgs  = p.media_urls || [];
  const media = imgs.length ? _storyImgsHtml(imgs) : '';

  return `<div class="post-item" style="animation-delay:${delay * 0.05}s;">
    ${tags ? `<div class="post-tags">${tags}</div>` : ''}
    ${p.content ? `<div class="post-body">${esc(p.content).replace(/\n/g, '<br>')}</div>` : ''}
    ${media}
    <div class="post-actions">
      <span class="post-time" style="margin-left:auto;">${timeAgo(p.created_at)}</span>
      ${CN.isOwner ? `<button data-del-post="${p.id}" class="post-del" style="background:none;border:none;font-size:14px;cursor:pointer;color:var(--muted);">🗑️</button>` : ''}
    </div>
  </div>`;
}

async function _deletePost(postId, roomId) {
  openConfirm('글을 삭제할까요?', '삭제하면 되돌릴 수 없어요.', async () => {
    const res  = await fetch('/api/posts', {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ post_id: postId, house_id: CN.houseId, owner_key: CN.ownerKey }),
    });
    const data = await res.json();
    if (data.success) { showToast('삭제됐어요'); await reloadData(); }
    else showToast(data.error || '삭제 실패');
  });
}

function renderLibrary(container) {
  const photos = CN.media.filter(m => m.media_type === 'photo');
  const videos = CN.media.filter(m => m.media_type === 'video');
  const lbUrls = photos.map(m => m.file_url);

  const photoGrid = photos.length
    ? `<div class="lib-grid">${photos.map((m, i) => `
        <div class="lib-item" data-lb-urls='${JSON.stringify(lbUrls)}' data-lb-idx="${i}">
          <img src="${esc(m.file_url)}" loading="lazy">
          ${CN.isOwner ? `
            <button class="lib-edit" data-lib-edit="${m.id}" data-lib-content="${esc(m.content || '')}">✏️</button>
            <button class="lib-del"  data-lib-del="${m.id}">🗑️</button>` : ''}
        </div>`).join('')}</div>`
    : `<div class="empty"><div class="ei">📷</div><p>아직 사진이 없어요</p></div>`;

  const videoList = videos.length
    ? videos.map(v => {
        const p = parseVideoUrl(v.file_url);
        if (!p) return '';
        return `<div class="video-item" style="background:white;border:1px solid rgba(139,94,60,.1);border-radius:16px;overflow:hidden;">
          <iframe class="video-embed${p.platform === 'TikTok' ? ' vert' : ''}"
            src="${p.embedUrl}" allowfullscreen></iframe>
          <div class="video-info" style="padding:12px 16px;display:flex;align-items:center;gap:10px;">
            <span class="video-plat">${p.platform}</span>
            ${CN.isOwner ? `<button class="video-del" data-video-del="${v.id}" style="margin-left:auto;background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted);">🗑️</button>` : ''}
          </div>
        </div>`;
      }).join('')
    : `<div class="empty"><div class="ei">🎬</div><p>아직 영상이 없어요</p></div>`;

  container.innerHTML = `
    <div class="section">
      <div class="sec-head" style="margin-bottom:16px;">
        <div><div class="sec-label">GALLERY</div><div class="sec-title">사진첩 📷</div></div>
        ${CN.isOwner ? `<button class="more-btn" id="libUploadBtn">+ 사진 추가</button>` : ''}
      </div>
      <div id="libPhotoWrap">${photoGrid}</div>
      <div class="sec-head" style="margin-top:40px;margin-bottom:16px;">
        <div><div class="sec-label">VIDEO</div><div class="sec-title">영상 🎬</div></div>
        ${CN.isOwner ? `<button class="more-btn" id="libVideoBtn">+ 영상 추가</button>` : ''}
      </div>
      <div class="video-list">${videoList}</div>
    </div>`;

  // 이벤트 위임
  container.addEventListener('click', e => {
    // 라이트박스
    const lbEl = e.target.closest('[data-lb-urls]');
    if (lbEl) { openLightbox(JSON.parse(lbEl.dataset.lbUrls), Number(lbEl.dataset.lbIdx)); return; }

    // 편집
    const editBtn = e.target.closest('[data-lib-edit]');
    if (editBtn) {
      e.stopPropagation();
      document.getElementById('editMediaId').value  = editBtn.dataset.libEdit;
      document.getElementById('editContent').value  = editBtn.dataset.libContent;
      openModal('editModal');
      return;
    }

    // 삭제 (사진)
    const delBtn = e.target.closest('[data-lib-del]');
    if (delBtn) { e.stopPropagation(); _deleteMedia(delBtn.dataset.libDel); return; }

    // 삭제 (영상)
    const vdelBtn = e.target.closest('[data-video-del]');
    if (vdelBtn) { _deleteMedia(vdelBtn.dataset.videoDel); return; }
  });

  container.querySelector('#libUploadBtn')?.addEventListener('click', () => {
    CN.uploadRoomId = null;
    document.getElementById('uploadDate').value = new Date().toISOString().slice(0, 10);
    openModal('uploadModal');
  });
  container.querySelector('#libVideoBtn')?.addEventListener('click', () => openModal('videoModal'));
}

async function _deleteMedia(id) {

      method: 'DELETE', headers: { 'Content-Type': 'application/json' },

}

  document.getElementById('composePrevCells').innerHTML    = '';
  document.getElementById('composeProgWrap').style.display = 'none';

  // 카테고리 칩
  const wrap = document.getElementById('composeCatWrap');
  wrap.innerHTML = CN.categories.map(c =>
    `<span class="cat-sel${c.is_event ? ' cat-event' : ''}" data-cat-sel="${c.id}"
      style="--cat-color:${c.color || (c.is_event ? '#F7C59F' : 'var(--mint)')};">${esc(c.name)}</span>`
  ).join('');
  wrap.querySelectorAll('[data-cat-sel]').forEach(el => {
    el.addEventListener('click', () => el.classList.toggle('on'));
  });

  openModal('composeModal');
  setTimeout(() => document.getElementById('composeContent').focus(), 120);
}

/* ══════════════════════════════════════════
   11. 파일 미리보기 헬퍼
══════════════════════════════════════════ */
function _renderPrevCells(files, cellsEl, wrapEl) {
  if (!files.length) { wrapEl.style.display = 'none'; return; }
  wrapEl.style.display = 'block';
  cellsEl.innerHTML = '';
  files.forEach((f, i) => {
    const cell = document.createElement('div');
    cell.className = 'prev-cell';
    const img  = document.createElement('img'); img.src = URL.createObjectURL(f);
    const rm   = document.createElement('button'); rm.className = 'prev-rm'; rm.textContent = '✕';
    rm.addEventListener('click', () => { files.splice(i, 1); _renderPrevCells(files, cellsEl, wrapEl); });
    cell.append(img, rm);
    cellsEl.appendChild(cell);
  });
}

async function _uploadFiles(files, progFill, progText) {
  const urls = [];
  for (let i = 0; i < files.length; i++) {
    progText.textContent = `${i + 1} / ${files.length} 업로드 중...`;
    const b64  = await resizeImg(files[i]);
    const blob = await b64Blob(b64);
    const url  = await cloudinaryUpload(blob);
    urls.push(url);
    progFill.style.width = `${Math.round(((i + 1) / files.length) * 100)}%`;
  }
  return urls;
}

/* ══════════════════════════════════════════
   12. Compose 제출
══════════════════════════════════════════ */
async function _submitCompose() {
  const content = document.getElementById('composeContent').value.trim();
  const catIds  = [...document.querySelectorAll('#composeCatWrap .cat-sel.on')].map(el => el.dataset.catSel);

  if (!content && !CN.composeFiles.length) { showToast('내용이나 사진을 추가해주세요'); return; }

  let mediaUrls = [];
  if (CN.composeFiles.length) {
    const progWrap = document.getElementById('composeProgWrap');
    const progFill = document.getElementById('composeProgFill');
    const progText = document.getElementById('composeProgText');
    progWrap.style.display = 'block';
    try {
      mediaUrls = await _uploadFiles(CN.composeFiles, progFill, progText);
    } catch { showToast('업로드 실패'); progWrap.style.display = 'none'; return; }
    progWrap.style.display = 'none';
  }

  const res  = await fetch('/api/posts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      house_id:     CN.houseId,
      owner_key:    CN.ownerKey,
      room_id:      _composeRoomId,
      content:      content || null,
      media_urls:   mediaUrls,
      category_ids: catIds,
    }),
  });
  const data = await res.json();
  if (data.id || data.success) {
    showToast('등록됐어요 ✅');
    closeModal('composeModal');
    await reloadData();
  } else showToast(data.error || '등록 실패');
}

/* ══════════════════════════════════════════
   13. Upload 제출 (서재 사진)
══════════════════════════════════════════ */
async function _submitUpload() {
  if (!CN.uploadFiles.length) { showToast('사진을 선택해주세요'); return; }
  const libRoom = CN.rooms.find(r => r.room_type === 'library');
  if (!libRoom) { showToast('서재를 찾을 수 없어요'); return; }

  const btn      = document.getElementById('uploadSubmitBtn');
  const progWrap = document.getElementById('uploadProgWrap');
  const progFill = document.getElementById('uploadProgFill');
  const progText = document.getElementById('uploadProgText');
  btn.disabled = true; progWrap.style.display = 'block';

  try {
    const urls    = await _uploadFiles(CN.uploadFiles, progFill, progText);
    const content = document.getElementById('uploadContent').value.trim();
    const taken   = document.getElementById('uploadDate').value;

    // 각 URL을 media 테이블에 저장
    for (const url of urls) {
      await fetch('/api/upload', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          house_id:   CN.houseId,
          room_id:    libRoom.id,
          file_url:   url,
          media_type: 'photo',
          content:    content || null,
          event_date: taken   || null,
        }),
      });
    }
    showToast(`${urls.length}장 업로드됐어요 📷`);
    closeModal('uploadModal');
    CN.uploadFiles = [];
    await reloadData();
  } catch { showToast('업로드 실패'); }
  finally { btn.disabled = false; progWrap.style.display = 'none'; }
}

/* ══════════════════════════════════════════
   14. Video 제출
══════════════════════════════════════════ */
async function _submitVideo() {
  const url     = document.getElementById('videoUrlInput').value.trim();

  const libRoom = CN.rooms.find(r => r.room_type === 'library');
  if (!libRoom) { showToast('서재를 찾을 수 없어요'); return; }

  const res  = await fetch('/api/upload', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      house_id:   CN.houseId,
      room_id:    libRoom.id,
      file_url:   url,
      media_type: 'video',
    }),
  });
  const data = await res.json();
  if (data.success) {
    showToast('영상이 추가됐어요 🎬');
    document.getElementById('videoUrlInput').value = '';
    closeModal('videoModal');
    await reloadData();

/* ══════════════════════════════════════════
   17. 라이트박스
══════════════════════════════════════════ */
function openLightbox(urls, idx = 0) {
  CN.lbImages = urls; CN.lbIndex = idx;
  _lbRender();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function _lbRender() {
  const track   = document.getElementById('lbTrack');
  const thumbs  = document.getElementById('lbThumbs');
  const counter = document.getElementById('lbCounter');
  const idx     = CN.lbIndex;
  const urls    = CN.lbImages;

  track.innerHTML = urls.map(u => `<div class="lb-slide"><img src="${esc(u)}"></div>`).join('');
  track.style.transform = `translateX(-${idx * 100}vw)`;
  thumbs.innerHTML = urls.map((u, i) =>
    `<div class="lb-thumb${i === idx ? ' active' : ''}" data-lb-go="${i}"><img src="${esc(u)}"></div>`).join('');
  counter.textContent = urls.length > 1 ? `${idx + 1} / ${urls.length}` : '';
}

function _lbGo(i) {
  CN.lbIndex = i; _lbRender();
}

document.getElementById('lbClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
});
document.getElementById('lbPrevBtn').addEventListener('click', () => { if (CN.lbIndex > 0) _lbGo(CN.lbIndex - 1); });
document.getElementById('lbNextBtn').addEventListener('click', () => { if (CN.lbIndex < CN.lbImages.length - 1) _lbGo(CN.lbIndex + 1); });
document.getElementById('lbThumbs').addEventListener('click', e => {
  const t = e.target.closest('[data-lb-go]');
  if (t) _lbGo(Number(t.dataset.lbGo));
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
});

function toggleFabSheet() {
  const sheet   = document.getElementById('fabSheet');
  const backdrop = document.getElementById('fabBackdrop');
  const fab     = document.getElementById('fab');
  const open    = sheet.classList.toggle('open');
  backdrop.classList.toggle('open', open);
  fab.classList.toggle('sheet-open', open);
  fab.textContent = open ? '✕' : '✏️';
}

function closeFabSheet() {
  document.getElementById('fabSheet').classList.remove('open');
  document.getElementById('fabBackdrop').classList.remove('open');
  const fab = document.getElementById('fab');
  fab.classList.remove('sheet-open');
  fab.textContent = '✏️';
}

document.getElementById('fab').addEventListener('click', toggleFabSheet);
document.getElementById('fabBackdrop').addEventListener('click', closeFabSheet);

function shareKakao() {
  const h   = CN.house; if (!h) return;
  const url = location.href;
  if (window.Kakao?.isInitialized?.()) {
    Kakao.Share.sendDefault({
      objectType: 'feed',
      content: {
        title:       h.name,
        description: h.description || 'CoreNull에서 소중한 순간을 기록하고 있어요',
        imageUrl:    h.cover_url   || '',
        link: { mobileWebUrl: url, webUrl: url },
      },
      buttons: [{ title: '집 방문하기', link: { mobileWebUrl: url, webUrl: url } }],
    });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('링크가 복사됐어요 🔗'));
  }
}

});
